# Lesson 01 — Audio Definition (v2)
# Root: إِلَٰه (ilāh) + ك ب ر (kabura)
# Anchor: اللهُ أَكْبَرُ
#
# Structure: 2 anchor phrases + 5 learning phrases + 5 practice phrases = 12 total
# See docs/selections/lesson-01.md for selection rationale.
#
# v2 changes (2025-06-04):
#   - Reduced from 20+1 → 12 phrases
#   - Added anchor phrases (59:22 + made-up teaching phrase)
#   - Dropped hadith section
#   - Retranslated 18:5 ("great" not "grave")
#   - Trimmed 2:34 (dropped وَكَانَ مِنَ الْكَافِرِينَ)
#   - Full 41:15 with question + response

lesson_id: lesson-01
title: "Lesson 1: Allāhu Akbar"
slug: lesson-01-allahu-akbar

sentences:

  # ============================================================
  # ROOT 1 — إِلَٰه: anchor phrase + 2 learning phrases
  # ============================================================

  - id: anchor-ilah
    role: anchor
    root: إِلَٰه
    form: "إِلَٰه"
    ref: "59:22"
    arabic_source:
      surah: 59
      ayah: 22
      # First clause only: هُوَ اللَّهُ الَّذِي لَا إِلَٰهَ إِلَّا هُوَ
      end: 8.0
    arabic_text: "هُوَ اللَّهُ الَّذِي لَا إِلَٰهَ إِلَّا هُوَ"
    english: "He is Allah — there is no god but He"

  - id: learn-ilah-01
    role: learn
    root: إِلَٰه
    form: "آلِهَة"
    ref: "6:74"
    arabic_source:
      surah: 6
      ayah: 74
      # Trimmed to the question: أَتَتَّخِذُ أَصْنَامًا آلِهَةً
      start: 9.0
      end: 22.0
    arabic_text: "أَتَتَّخِذُ أَصْنَامًا آلِهَةً"
    english: "Do you take idols as gods?"

  - id: learn-ilah-02
    role: learn
    root: إِلَٰه
    form: "اللَّهُمَّ"
    ref: "3:26"
    arabic_source:
      surah: 3
      ayah: 26
      # First clause: قُلِ اللَّهُمَّ مَالِكَ الْمُلْكِ
      end: 5.0
    arabic_text: "قُلِ اللَّهُمَّ مَالِكَ الْمُلْكِ"
    english: "Say: O Allah, Owner of all sovereignty"

  # ============================================================
  # ROOT 2 — كَبُرَ: anchor phrase + 3 learning phrases
  # ============================================================

  - id: anchor-kabura
    role: anchor
    root: كَبُرَ
    form: "كَبِير + أَكْبَر"
    ref: "teaching-phrase"
    arabic_source:
      # Made-up teaching phrase — use Arabic TTS
      use_arabic_tts: true
    arabic_text: "هُوَ كَبِيرٌ. أَنَا أَكْبَرُ مِنْهُ. وَاللَّهُ أَكْبَرُ مِنَّا، بَلْ، مِنْ كُلِّ شَيْءٍ"
    english: "He is great. I am greater than him. And Allah is greater than us — rather, than everything."

  - id: learn-kabura-01
    role: learn
    root: كَبُرَ
    form: كُبْرَى
    ref: "79:20"
    arabic_source:
      surah: 79
      ayah: 20
    arabic_text: "فَأَرَاهُ الْآيَةَ الْكُبْرَىٰ"
    english: "And he showed him the greatest sign"

  - id: learn-kabura-02
    role: learn
    root: كَبُرَ
    form: كَبُرَ
    ref: "61:3"
    arabic_source:
      surah: 61
      ayah: 3
    arabic_text: "كَبُرَ مَقْتًا عِندَ اللَّهِ أَن تَقُولُوا مَا لَا تَفْعَلُونَ"
    english: "Greatly hateful in the sight of Allah — that you say what you do not do"

  - id: learn-kabura-03
    role: learn
    root: كَبُرَ
    form: اسْتَكْبَرَ
    ref: "2:34"
    arabic_source:
      surah: 2
      ayah: 34
      # Trimmed: إِلَّا إِبْلِيسَ أَبَىٰ وَاسْتَكْبَرَ (dropped وَكَانَ مِنَ الْكَافِرِينَ)
      start: 8.5
      end: 14.0
    arabic_text: "إِلَّا إِبْلِيسَ أَبَىٰ وَاسْتَكْبَرَ"
    english: "Except Iblis — he refused and was arrogant"

  # ============================================================
  # PRACTICE — 5 phrases, mixed roots, no notes
  # ============================================================

  - id: practice-01
    role: practice
    root: إِلَٰه
    form: "إِلَٰه (×3)"
    ref: "2:163"
    arabic_source:
      surah: 2
      ayah: 163
    arabic_text: "وَإِلَٰهُكُمْ إِلَٰهٌ وَاحِدٌ ۖ لَا إِلَٰهَ إِلَّا هُوَ الرَّحْمَٰنُ الرَّحِيمُ"
    english: "And your God is one God — there is no god but He, the Most Merciful, the Most Compassionate"

  - id: practice-02
    role: practice
    root: كَبُرَ
    form: كَبِير
    ref: "21:63"
    arabic_source:
      surah: 21
      ayah: 63
    arabic_text: "قَالَ بَلْ فَعَلَهُ كَبِيرُهُمْ هَٰذَا فَاسْأَلُوهُمْ إِن كَانُوا يَنطِقُونَ"
    english: "He said: Rather, their chief did it — ask them, if they can speak"

  - id: practice-03
    role: practice
    root: كَبُرَ
    form: أَكْبَرُ
    ref: "29:45"
    arabic_source:
      surah: 29
      ayah: 45
      # Fragment: وَلَذِكْرُ اللَّهِ أَكْبَرُ — near end of ayah
      start: 27.5
      end: 33.5
    arabic_text: "وَلَذِكْرُ اللَّهِ أَكْبَرُ"
    english: "And the remembrance of Allah is greater"

  - id: practice-04
    role: practice
    root: كَبُرَ
    form: كَبُرَ
    ref: "18:5"
    arabic_source:
      surah: 18
      ayah: 5
      # Fragment: كَبُرَتْ كَلِمَةً تَخْرُجُ مِنْ أَفْوَاهِهِمْ
      start: 10.0
    arabic_text: "كَبُرَتْ كَلِمَةً تَخْرُجُ مِنْ أَفْوَاهِهِمْ ۚ إِن يَقُولُونَ إِلَّا كَذِبًا"
    english: "How great a word that comes from their mouths — they speak nothing but a lie"
    note: "Retranslated: 'great' not 'grave' to keep root connection visible"

  - id: practice-05
    role: practice
    root: كَبُرَ
    form: اسْتَكْبَرَ
    ref: "41:15"
    arabic_source:
      surah: 41
      ayah: 15
      # Full verse — includes the boast + Allah's response
    arabic_text: "فَأَمَّا عَادٌ فَاسْتَكْبَرُوا فِي الْأَرْضِ بِغَيْرِ الْحَقِّ وَقَالُوا مَنْ أَشَدُّ مِنَّا قُوَّةً ۖ أَوَلَمْ يَرَوْا أَنَّ اللَّهَ الَّذِي خَلَقَهُمْ هُوَ أَشَدُّ مِنْهُمْ قُوَّةً"
    english: "As for ʿĀd, they were arrogant on earth without right and said: Who is mightier than us in strength? Did they not see that Allah who created them is mightier than them in strength?"
