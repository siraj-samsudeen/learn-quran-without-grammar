# Lesson 01 — Audio Definition (v2)
# Root: إِلَٰه (ilāh) + ك ب ر (kabura)
# Anchor: اللهُ أَكْبَرُ
#
# Structure: 2 anchor phrases + 5 learning phrases + 5 practice phrases = 12 total
# Each Quranic phrase uses a DIFFERENT reciter (see ADR-005).
# See docs/selections/lesson-01.md for selection rationale.

lesson_id: lesson-01
title: "Lesson 1: Allāhu Akbar"
slug: lesson-01-allahu-akbar

sentences:

  # ============================================================
  # ROOT 1 — إِلَٰه: anchor phrase + 2 learning phrases
  # ============================================================

  - id: anchor-ilah
    role: anchor
    root: إِلَٰه
    form: "إِلَٰه"
    ref: "59:22"
    reciter: Hani_Rifai_192kbps
    arabic_source:
      surah: 59
      ayah: 22
      # First clause only — hard-cut (no natural pause at this point)
      end: 7.0
    arabic_text: "هُوَ اللَّهُ الَّذِي لَا إِلَٰهَ إِلَّا هُوَ"
    english: "He is Allah — there is no god but He"

  - id: learn-ilah-01
    role: learn
    root: إِلَٰه
    form: "آلِهَة"
    ref: "6:74"
    reciter: Abu_Bakr_Ash-Shaatree_128kbps
    arabic_source:
      surah: 6
      ayah: 74
      # Full intro + question, cut before إِنِّي أَرَاكَ...
      end: 12.0
    arabic_text: "وَإِذْ قَالَ إِبْرَاهِيمُ لِأَبِيهِ آزَرَ أَتَتَّخِذُ أَصْنَامًا آلِهَةً"
    english: "And when Ibrahim said to his father Azar: Do you take idols as gods?"

  - id: learn-ilah-02
    role: learn
    root: إِلَٰه
    form: "اللَّهُمَّ"
    ref: "3:26"
    reciter: Hudhaify_128kbps
    arabic_source:
      surah: 3
      ayah: 26
      # First 4 words only — hard-cut
      end: 5.0
    arabic_text: "قُلِ اللَّهُمَّ مَالِكَ الْمُلْكِ"
    english: "Say: O Allah, Owner of all sovereignty"

  # ============================================================
  # ROOT 2 — كَبُرَ: anchor phrase + 3 learning phrases
  # ============================================================

  - id: anchor-kabura
    role: anchor
    root: كَبُرَ
    form: "كَبِير + أَكْبَر"
    ref: "teaching-phrase"
    arabic_source:
      use_arabic_tts: true
    arabic_text: "هُوَ كَبِيرٌ. أَنَا أَكْبَرُ مِنْهُ. وَاللَّهُ أَكْبَرُ مِنَّا، بَلْ، مِنْ كُلِّ شَيْءٍ"
    english: "He is great. I am greater than him. And Allah is greater than us — rather, than everything."

  - id: learn-kabura-01
    role: learn
    root: كَبُرَ
    form: كُبْرَى
    ref: "79:20"
    reciter: Husary_128kbps
    arabic_source:
      surah: 79
      ayah: 20
    arabic_text: "فَأَرَاهُ الْآيَةَ الْكُبْرَىٰ"
    english: "And he showed him the greatest sign"

  - id: learn-kabura-02
    role: learn
    root: كَبُرَ
    form: كَبُرَ
    ref: "61:3"
    reciter: Alafasy_128kbps
    arabic_source:
      surah: 61
      ayah: 3
    arabic_text: "كَبُرَ مَقْتًا عِندَ اللَّهِ أَن تَقُولُوا مَا لَا تَفْعَلُونَ"
    english: "Greatly hateful in the sight of Allah — that you say what you do not do"

  - id: learn-kabura-03
    role: learn
    root: كَبُرَ
    form: اسْتَكْبَرَ
    ref: "2:34"
    reciter: Abdul_Basit_Mujawwad_128kbps
    arabic_source:
      surah: 2
      ayah: 34
      # Full ayah — Mujawwad style, 30.9s
    arabic_text: "وَإِذْ قُلْنَا لِلْمَلَائِكَةِ اسْجُدُوا لِآدَمَ فَسَجَدُوا إِلَّا إِبْلِيسَ أَبَىٰ وَاسْتَكْبَرَ وَكَانَ مِنَ الْكَافِرِينَ"
    english: "And when We said to the angels: Prostrate to Adam — they all prostrated, except Iblis. He refused and was arrogant, and became of the disbelievers."

  # ============================================================
  # PRACTICE — 5 phrases, mixed roots, no notes
  # ============================================================

  - id: practice-01
    role: practice
    root: إِلَٰه
    form: "إِلَٰه (×3)"
    ref: "2:163"
    reciter: Yasser_Ad-Dussary_128kbps
    arabic_source:
      surah: 2
      ayah: 163
    arabic_text: "وَإِلَٰهُكُمْ إِلَٰهٌ وَاحِدٌ ۖ لَا إِلَٰهَ إِلَّا هُوَ الرَّحْمَٰنُ الرَّحِيمُ"
    english: "And your God is one God — there is no god but He, the Most Merciful, the Most Compassionate"

  - id: practice-02
    role: practice
    root: كَبُرَ
    form: كَبِير
    ref: "21:63"
    reciter: MaherAlMuaiqly128kbps
    arabic_source:
      surah: 21
      ayah: 63
    arabic_text: "قَالَ بَلْ فَعَلَهُ كَبِيرُهُمْ هَٰذَا فَاسْأَلُوهُمْ إِن كَانُوا يَنطِقُونَ"
    english: "He said: Rather, their chief did it — ask them, if they can speak"

  - id: practice-03
    role: practice
    root: كَبُرَ
    form: أَكْبَرُ
    ref: "29:45"
    reciter: Abdul_Basit_Murattal_192kbps
    arabic_source:
      surah: 29
      ayah: 45
      # Last clause — clean pause before it at 24.2s
      start: 24.2
      end: 29.0
    arabic_text: "وَلَذِكْرُ اللَّهِ أَكْبَرُ"
    english: "And the remembrance of Allah is greater"

  - id: practice-04
    role: practice
    root: كَبُرَ
    form: كَبُرَ
    ref: "18:5"
    reciter: Ghamadi_40kbps
    arabic_source:
      surah: 18
      ayah: 5
      # Second clause — clean pause at 7.5s
      start: 7.5
    arabic_text: "كَبُرَتْ كَلِمَةً تَخْرُجُ مِنْ أَفْوَاهِهِمْ ۚ إِن يَقُولُونَ إِلَّا كَذِبًا"
    english: "How great a word that comes from their mouths — they speak nothing but a lie"

  - id: practice-05
    role: practice
    root: كَبُرَ
    form: اسْتَكْبَرَ
    ref: "41:15"
    reciter: Abdurrahmaan_As-Sudais_192kbps
    arabic_source:
      surah: 41
      ayah: 15
    arabic_text: "فَأَمَّا عَادٌ فَاسْتَكْبَرُوا فِي الْأَرْضِ بِغَيْرِ الْحَقِّ وَقَالُوا مَنْ أَشَدُّ مِنَّا قُوَّةً ۖ أَوَلَمْ يَرَوْا أَنَّ اللَّهَ الَّذِي خَلَقَهُمْ هُوَ أَشَدُّ مِنْهُمْ قُوَّةً"
    english: "As for ʿĀd, they were arrogant on earth without right and said: Who is mightier than us in strength? Did they not see that Allah who created them is mightier than them in strength?"
