roots:

  # ----------------------------------------------------------
  # ROOT 1: إِلَٰه
  # ----------------------------------------------------------
  - id: root-ilah
    root_letters: "أ ل ه"
    root_name: "إِلَٰه"
    root_transliteration: "alif lām hā"
    meaning: "god"

    explanation:
      en: |
        **اللّٰه** comes from the root **أ ل ه (alif lām hā)**.
        Every time you say *Lā ilāha illallāh*, you are using this word.

        At its core, this root carries the idea of **worship, devotion,
        and turning to something with complete love and awe.** The word
        **إِلَٰه** is anything that your heart turns to as ultimate —
        anything you worship, depend on, or are deeply attached to. For
        some of us, it might be our car, our phone, spouse or even
        business or job.

        The Qur'an uses it when speaking about the One true God, and when
        challenging the false ones.
      ta: |
        **اللّٰه** என்ற வார்த்தை **أ ل ه** (அலிஃப் லாம் ஹா) என்ற
        வேர்ச்சொல்லிலிருந்து வருகிறது. நீங்கள் *லா இலாஹ இல்லல்லாஹ்*
        என்று ஒவ்வொரு முறை சொல்லும்போதும், இந்த வார்த்தையைப்
        பயன்படுத்துகிறீர்கள்.

        இந்த வேர்ச்சொல்லின் மையக் கருத்து: **வணக்கம், பக்தி, முழுமையான
        அன்பு மற்றும் பிரமிப்புடன் ஒன்றை நோக்கித் திரும்புதல்.** **إِلَٰه**
        என்பது உங்கள் இதயம் இறுதியானதாகத் திரும்பும் எதையும் குறிக்கிறது —
        நீங்கள் வணங்குவது, சார்ந்திருப்பது, அல்லது ஆழமாக
        இணைந்திருப்பது. நம்மில் சிலருக்கு அது நமது கார், தொலைபேசி,
        துணைவர் அல்லது வேலையாகக்கூட இருக்கலாம்.

        குர்ஆன் இதை ஒரே உண்மையான கடவுளைப் பற்றிப் பேசும்போதும்,
        பொய்யான கடவுள்களை மறுக்கும்போதும் பயன்படுத்துகிறது.

