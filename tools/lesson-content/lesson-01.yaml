            குர்ஆனின் மிகத் துணிச்சலான கேள்விகளில் ஒன்று.

      - id: learning-ilah-02
        role: learning
        form: "اللَّهُمَّ"
        ref: "3:26"
        reciter: Hudhaify_128kbps
        arabic_source: { surah: 3, ayah: 26, end: 5.0 }
        arabic_source_full: { surah: 3, ayah: 26 }
        arabic_text: "قُلِ اللَّهُمَّ مَالِكَ الْمُلْكِ"
        en: "Say: O Allah, King of kings"
        ta: "கூறுவீராக: அல்லாஹ்வே, ஆட்சியின் அதிபதியே"
        hook:
          en: >
            This is how you call upon Him directly. Every duʿā you make
            that begins with اللَّهُمَّ carries this root.
          ta: >
            இப்படித்தான் நீங்கள் அவனை நேரடியாக அழைக்கிறீர்கள்.
            اللَّهُمَّ என்று தொடங்கும் ஒவ்வொரு துஆவிலும் இந்த
            வேர்ச்சொல் இருக்கிறது.

  # ----------------------------------------------------------
  # ROOT 2: كَبُرَ
  # ----------------------------------------------------------
  - id: root-kabur
    root_letters: "ك ب ر"
    root_name: "كَبُرَ"
    root_transliteration: "kāf bā rā"
    meaning: "greatness"

    explanation:
      en: |
        The same three letters that praise Allah's greatness also describe
        the worst sin in the Qur'an. Let's see how.

        The root **ك ب ر** (kāf bā rā) carries one core meaning:
        *something is big or great.* Think of it like a seed of greatness
        — plant it in different soil and it grows into different words. It
        can mean simply *big*. It can mean *the greatest*. And when someone
        claims that greatness for himself — when he puffs himself up and
        refuses to bow — it becomes *arrogance*.

        Every time you say اللهُ أَكْبَرُ, you are reaching into this root
        and pulling out its highest meaning: Allah is greater. Greater than
        your fear. Greater than your distraction. Greater than anything
        standing in front of you.
      ta: |
        அல்லாஹ்வின் மகத்துவத்தைப் புகழும் அதே மூன்று எழுத்துக்கள்,
        குர்ஆனின் மிக மோசமான பாவத்தையும் விவரிக்கின்றன. எப்படி என்று
        பார்ப்போம்.

        **ك ب ر** (காஃப் பா ரா) என்ற வேர்ச்சொல் ஒரே ஒரு மையக்
        கருத்தைக் கொண்டுள்ளது: *ஏதாவது பெரியது அல்லது மகத்தானது.*
        இதை மகத்துவத்தின் விதையாக நினையுங்கள் — வேறு வேறு மண்ணில்
        நட்டால் வேறு வேறு வார்த்தைகளாக வளரும். இது வெறுமனே *பெரியது*
        என்று பொருள்படலாம். *மிகப் பெரியது* என்றும் ஆகலாம். ஒருவன்
        அந்த மகத்துவத்தை தனக்கென உரிமை கொண்டாடும்போது — தன்னைப்
        பெரிதாக நினைத்து சிரம் பணிய மறுக்கும்போது — அது *ஆணவம்*
        ஆகிறது.

        நீங்கள் اللهُ أَكْبَرُ என்று சொல்லும் ஒவ்வொரு முறையும், இந்த
        வேர்ச்சொல்லின் மிக உயர்ந்த பொருளை எடுக்கிறீர்கள்: அல்லாஹ்
        மிகப் பெரியவன். உங்கள் பயத்தை விடப் பெரியவன். உங்கள்
        கவனச்சிதறலை விடப் பெரியவன். உங்கள் முன் நிற்கும் எதை விடவும்
        பெரியவன்.

