lesson_id: lesson-01
title: "Lesson 1: Allāhu Akbar"
slug: lesson-01-allahu-akbar
description: >
  Two root words behind Allāhu Akbar — إِلَٰه (god) and كَبُرَ (greatness)
  — 8 words through 12 Qur'anic phrases.

# ============================================================
# LESSON INTRODUCTION
# ============================================================

intro:
  en: |
    In this series of lessons, we will walk through each of the sentences
    in the Adhan (Call to prayer) and use the words there as our **hooks**
    to get into the Quran using the beautiful concept of **roots** in
    Arabic language.
  ta: |
    இந்தப் பாடத் தொடரில், அதான் (தொழுகை அழைப்பு) வாக்கியங்களை
    ஒவ்வொன்றாகப் பார்ப்போம். அரபி மொழியின் அழகான **வேர்ச்சொல்**
    கருத்தைப் பயன்படுத்தி அவற்றை குர்ஆனுக்குள் நுழைவதற்கான
    **கொக்கிகளாக** பயன்படுத்துவோம்.

preview:
  en: >
    In the first lesson, you will meet **8 Arabic words** from two root
    families — the roots behind **اللهُ أَكْبَرُ** — through 11 ayahs
    from the Quran plus 1 teaching phrase.
  ta: >
    இந்த முதல் பாடத்தில், நீங்கள் **8 அரபி வார்த்தைகளை** சந்திப்பீர்கள்
    — **اللهُ أَكْبَرُ** என்பதன் பின்னால் உள்ள இரண்டு வேர்ச்சொல்
    குடும்பங்களிலிருந்து — குர்ஆனின் 11 ஆயத்துகள் மற்றும் 1 கற்பித்தல்
    சொற்றொடர் மூலம்.

