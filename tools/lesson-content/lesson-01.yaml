quiz:
  intro:
    en: >
      Look at the highlighted word in each ayah. Can you recall its
      meaning? Click to reveal the answer.
    ta: >
      ஒவ்வொரு ஆயத்திலும் சிறப்பிக்கப்பட்ட வார்த்தையைப் பாருங்கள்.
      அதன் பொருளை நினைவுகூர முடியுமா? பதிலைக் காண கிளிக் செய்யுங்கள்.

  items:
    - arabic_context: "هُوَ اللَّهُ الَّذِي لَا **إِلَٰهَ** إِلَّا هُوَ"
      highlighted_word: "إِلَٰهَ"
      answer_en: "god"
      answer_ta: "கடவுள்"

    - arabic_context: "أَتَتَّخِذُ أَصْنَامًا **آلِهَةً**"
      highlighted_word: "آلِهَةً"
      answer_en: "gods (plural)"
      answer_ta: "கடவுள்கள் (பன்மை)"

    - arabic_context: "قُلِ **اللَّهُمَّ** مَالِكَ الْمُلْكِ"
      highlighted_word: "اللَّهُمَّ"
      answer_en: "O Allah"
      answer_ta: "அல்லாஹ்வே"

    - arabic_context: "فَأَرَاهُ الْآيَةَ **الْكُبْرَىٰ**"
      highlighted_word: "الْكُبْرَىٰ"
      answer_en: "the greatest"
      answer_ta: "மிகப் பெரிய"

    - arabic_context: "**كَبُرَ** مَقْتًا عِندَ اللَّهِ أَن تَقُولُوا مَا لَا تَفْعَلُونَ"
      highlighted_word: "كَبُرَ"
      answer_en: "was great / greatly"
      answer_ta: "பெரியதாக இருந்தது / மிகவும்"

    - arabic_context: "أَبَىٰ وَ**اسْتَكْبَرَ** وَكَانَ مِنَ الْكَافِرِينَ"
      highlighted_word: "اسْتَكْبَرَ"
      answer_en: "was arrogant"
      answer_ta: "ஆணவம் கொண்டான்"

    - arabic_context: "وَلَذِكْرُ اللَّهِ **أَكْبَرُ**"
      highlighted_word: "أَكْبَرُ"
      answer_en: "greater / greatest"
      answer_ta: "மிகப் பெரிய"

    - arabic_context: "قَالَ بَلْ فَعَلَهُ **كَبِيرُهُمْ** هَٰذَا"
      highlighted_word: "كَبِيرُهُمْ"
      answer_en: "their chief / their biggest"
      answer_ta: "அவர்களின் தலைவன் / மிகப் பெரியவன்"

# ============================================================
# CLOSING
# ============================================================

closing:
  en: |
    This lesson moved through one question — *what is truly great?* The
    first root asked what you worship. The second asked what you consider
    great. The Qur'an's answer came in the voice of prophets, in the fall
    of Iblīs, and in the phrase you already carry: **اللهُ أَكْبَرُ**.

    You started this lesson knowing two words. Now you have met the roots
    behind them — in Ibrāhīm's challenge to his father, in the greatest
    sign shown to Pharaoh, in the arrogance of Iblīs, and in that
    beautiful phrase: *the remembrance of Allah is greater.*

    From now on, listen for these roots. When you stand in ṣalāh and hear
    the Qur'an recited, notice any word that sounds like **إِلَٰه** or
    **كَبُرَ**. When you hear the adhān, when you read Qur'an, even when
    you hear Arabic anywhere — see if you can spot a word from these two
    families. You will be surprised how often they appear. That moment of
    recognition — *"I know this word!"* — is exactly what we are building,
    one root at a time.
  ta: |
    இந்தப் பாடம் ஒரு கேள்வியின் வழியாகச் சென்றது — *உண்மையில்
    மகத்தானது எது?* முதல் வேர்ச்சொல் நீங்கள் எதை வணங்குகிறீர்கள்
    என்று கேட்டது. இரண்டாவது நீங்கள் எதை மகத்தானதாகக் கருதுகிறீர்கள்
    என்று கேட்டது. குர்ஆனின் பதில் நபிமார்களின் குரலில், இப்லீஸின்
    வீழ்ச்சியில், நீங்கள் ஏற்கனவே சுமந்திருக்கும் அந்தச் சொற்றொடரில்
    வந்தது: **اللهُ أَكْبَرُ**.

    இந்தப் பாடத்தை இரண்டு வார்த்தைகளை மட்டும் அறிந்தவர்களாகத்
    தொடங்கினீர்கள். இப்போது அவற்றின் பின்னால் உள்ள வேர்ச்சொற்களைச்
    சந்தித்துவிட்டீர்கள் — இப்ராஹீமின் தந்தைக்கான சவாலில்,
    ஃபிர்அவ்னுக்குக் காட்டப்பட்ட மிகப் பெரிய அத்தாட்சியில், இப்லீஸின்
    ஆணவத்தில், அந்த அழகான சொற்றொடரில்: *அல்லாஹ்வின் நினைவே மிகப்
    பெரியது.*

    இனிமேல், இந்த வேர்ச்சொற்களைக் கேளுங்கள். நீங்கள் தொழுகையில்
    நிற்கும்போது குர்ஆன் ஓதப்படுவதைக் கேட்டால், **إِلَٰه** அல்லது
    **كَبُرَ** போல் ஒலிக்கும் எந்த வார்த்தையையும் கவனியுங்கள். அதான்
    கேட்கும்போது, குர்ஆன் படிக்கும்போது, அரபி எங்கே கேட்டாலும் —
    இந்த இரண்டு குடும்பங்களிலிருந்து ஒரு வார்த்தையைக் கண்டுபிடிக்க
    முடியுமா பாருங்கள். அவை எவ்வளவு அடிக்கடி தோன்றும் என்று நீங்கள்
    ஆச்சரியப்படுவீர்கள். அந்த அங்கீகாரத்தின் தருணம் — *"இந்த
    வார்த்தை எனக்குத் தெரியும்!"* — இதுதான் நாம்
    கட்டிக்கொண்டிருக்கிறோம், ஒரு நேரத்தில் ஒரு வேர்ச்சொல்.

next_lesson:
  en: |
    In the next lesson, we'll take the second phrase of the adhān —
    **أَشْهَدُ أَنْ لَا إِلَٰهَ إِلَّا ٱللَّهُ** — and you'll discover
    that the word **أَشْهَدُ** doesn't just mean "I testify." Its root
    will take you somewhere unexpected.
  ta: |
    அடுத்த பாடத்தில், அதானின் இரண்டாவது சொற்றொடரை எடுப்போம் —
    **أَشْهَدُ أَنْ لَا إِلَٰهَ إِلَّا ٱللَّهُ** — **أَشْهَدُ** என்ற
    வார்த்தை வெறுமனே "நான் சாட்சி அளிக்கிறேன்" என்று மட்டும்
    பொருள்படாது என்பதை நீங்கள் கண்டுபிடிப்பீர்கள். அதன் வேர்ச்சொல்
    உங்களை எதிர்பாராத இடத்திற்கு அழைத்துச் செல்லும்.
