# LEARNING-PRACTICE SECTION (merged into Learning flow)
# ============================================================

learning_practice:
  intro:
    en: >
      You've met all 8 words. Now see if you can spot them on your own —
      try to predict the meaning of the highlighted word before reading
      the English.
    ta: >
      நீங்கள் 8 வார்த்தைகளையும் சந்தித்துவிட்டீர்கள். இப்போது நீங்களே
      அவற்றைக் கண்டுபிடிக்க முடியுமா பாருங்கள் — மொழிபெயர்ப்பைப்
      படிக்கும் முன் சிறப்பிக்கப்பட்ட வார்த்தையின் பொருளைக் கணிக்க
      முயற்சியுங்கள்.

  cards:
    - id: learning-01
      root: كَبُرَ
      form: "أَكْبَرُ"
      ref: "29:45"
      reciter: Abdul_Basit_Murattal_192kbps
      arabic_source: { surah: 29, ayah: 45, start: 20.2, end: 24 }
      arabic_source_full: { surah: 29, ayah: 45 }
      arabic_text: "وَلَذِكْرُ اللَّهِ أَكْبَرُ"
      en: "And the remembrance of Allah is greater"
      ta: "அல்லாஹ்வின் நினைவே மிகப் பெரியது"
      hook:
        en: >
          Your word — **أَكْبَر** — but not in the adhān this time. Allah
          is telling you what matters most: remembering Him is greater
          than anything else.
        ta: >
          உங்கள் வார்த்தை — **أَكْبَر** — ஆனால் இம்முறை அதானில்
          அல்ல. அல்லாஹ் உங்களுக்கு மிக முக்கியமானதைச் சொல்கிறான்:
          அவனை நினைவுகூர்வது மற்ற எல்லாவற்றையும் விட மிகப் பெரியது.

    - id: learning-02
      root: كَبُرَ
      form: "كَبُرَ"
      ref: "18:5"
      reciter: Ghamadi_40kbps
      arabic_source: { surah: 18, ayah: 5, start: 7.5 }
      arabic_source_full: { surah: 18, ayah: 5 }
      arabic_text: "كَبُرَتْ كَلِمَةً تَخْرُجُ مِنْ أَفْوَاهِهِمْ ۚ إِن يَقُولُونَ إِلَّا كَذِبًا"
      en: "How great a word that comes from their mouths — they speak nothing but a lie"
      ta: "அவர்களின் வாயிலிருந்து வரும் வார்த்தை எவ்வளவு பெரியது — அவர்கள் பொய்யைத் தவிர வேறு எதையும் பேசுவதில்லை"
      hook:
        en: >
          Notice **كَبُرَتْ** — the same root verb you met earlier, now
          with a feminine ending. The root letters kāf-bā-rā are right
          there.
        ta: >
          **كَبُرَتْ** கவனியுங்கள் — நீங்கள் முன்பு சந்தித்த அதே
          வேர்ச்சொல் வினை, இப்போது பெண்பால் முடிவுடன். வேர்
          எழுத்துக்கள் காஃப்-பா-ரா அங்கேயே இருக்கின்றன.

    - id: learning-03
      root: كَبُرَ
      form: "كَبِير"
      ref: "21:63"
      reciter: MaherAlMuaiqly128kbps
      arabic_source: { surah: 21, ayah: 63 }
      arabic_text: "قَالَ بَلْ فَعَلَهُ كَبِيرُهُمْ هَٰذَا فَاسْأَلُوهُمْ إِن كَانُوا يَنطِقُونَ"
      en: "He said: Rather, their chief did it — ask them, if they can speak"
      ta: "அவர் கூறினார்: இல்லை, அவர்களின் தலைவன் இதைச் செய்தான் — அவர்கள் பேச முடியுமானால் அவர்களிடமே கேளுங்கள்"
      hook:
        en: >
          Ibrāhīm again — this time using wit. He smashed the idols and
          blamed the biggest one. Notice **كَبِيرُهُمْ** — "their
          biggest/chief." Same root, now describing a statue.
        ta: >
          மீண்டும் இப்ராஹீம் — இம்முறை புத்திசாலித்தனமாக. சிலைகளை
          உடைத்துவிட்டு மிகப் பெரிய சிலையின் மீது பழி போட்டார்.
          **كَبِيرُهُمْ** கவனியுங்கள் — "அவர்களின் பெரியவன்/தலைவன்."
          அதே வேர்ச்சொல், இப்போது ஒரு சிலையை விவரிக்கிறது.

    - id: learning-04
      root: إِلَٰه
      form: "إِلَٰه (×3)"
      ref: "2:163"
      reciter: Yasser_Ad-Dussary_128kbps
      arabic_source: { surah: 2, ayah: 163 }
      arabic_text: "وَإِلَٰهُكُمْ إِلَٰهٌ وَاحِدٌ ۖ لَا إِلَٰهَ إِلَّا هُوَ الرَّحْمَٰنُ الرَّحِيمُ"
      en: "And your God is one God — there is no god but He, the Most Merciful, the Continuously Merciful"
      ta: "உங்கள் இறைவன் ஒரே இறைவன் — அவனைத் தவிர வேறு இறைவன் இல்லை, மிக்க அருளாளன், நிரந்தர அருளாளன்"
      hook:
        en: >
          Three times in one ayah — **إِلَٰه** appears three times. This
          single verse is the Qur'an's most complete statement of tawḥīd.
        ta: >
          ஒரே ஆயத்தில் மூன்று முறை — **إِلَٰه** மூன்று முறை
          வருகிறது. இந்த ஒற்றை வசனம் தவ்ஹீதின் மிகச் சிறந்த
          அறிக்கை.

    - id: learning-05
      root: كَبُرَ
      form: "اسْتَكْبَرَ"
      ref: "41:15"
      reciter: Abdurrahmaan_As-Sudais_192kbps
      arabic_source: { surah: 41, ayah: 15, end: 16 }
      arabic_text: "فَأَمَّا عَادٌ فَاسْتَكْبَرُوا فِي الْأَرْضِ بِغَيْرِ الْحَقِّ وَقَالُوا مَنْ أَشَدُّ مِنَّا قُوَّةً ۖ أَوَلَمْ يَرَوْا أَنَّ اللَّهَ الَّذِي خَلَقَهُمْ هُوَ أَشَدُّ مِنْهُمْ قُوَّةً"
      en: "As for Aad, they were arrogant on earth without right and said: Who is mightier than us in strength? Did they not see that Allah who created them is mightier than them in strength?"
      ta: "ஆத் சமூகத்தினர் பூமியில் அநியாயமாக ஆணவம் கொண்டு கூறினர்: எங்களை விட வலிமையானவர் யார்? அவர்களைப் படைத்த அல்லாஹ் அவர்களை விட வலிமையானவன் என்பதை அவர்கள் பார்க்கவில்லையா?"
      hook:
        en: >
          An entire civilisation that said: "Who is mightier than us?"
          The Qur'an's answer is devastating. Notice **اسْتَكْبَرُوا** —
          the same word as Iblīs, but now it's a whole nation.
        ta: >
          "எங்களை விட வலிமையானவர் யார்?" என்று கேட்ட ஒரு முழு
          நாகரிகம். குர்ஆனின் பதில் அழிவுகரமானது. **اسْتَكْبَرُوا**
          கவனியுங்கள் — இப்லீஸின் அதே வார்த்தை, ஆனால் இப்போது ஒரு
          முழு தேசம்.

