    cards:
      - id: anchor-kabura
        role: anchor
        form: "كَبِير + أَكْبَر"
        ref: "teaching-phrase"
        arabic_source: { use_arabic_tts: true }  # not from Quran CDN
        arabic_text: "هُوَ كَبِيرٌ. أَنَا أَكْبَرُ مِنْهُ. وَاللَّهُ أَكْبَرُ مِنَّا، بَلْ، مِنْ كُلِّ شَيْءٍ"
        en: "He is great. I am greater than him. And Allah is greater than us — rather, than everything."
        ta: "அவன் பெரியவன். நான் அவனை விடப் பெரியவன். அல்லாஹ் நம்மை விட — இல்லை, எல்லாவற்றையும் விடப் பெரியவன்."
        hook:
          en: >
            Listen to how the root moves: **كَبِير** → **أَكْبَر** →
            **أَكْبَر**. It starts between two people, then lifts to
            Allah. That is the word you say in every ṣalāh.
          ta: >
            வேர்ச்சொல் எப்படி நகர்கிறது என்று கேளுங்கள்: **كَبِير** →
            **أَكْبَر** → **أَكْبَر**. இது இரண்டு மனிதர்களுக்கிடையே
            தொடங்கி, பிறகு அல்லாஹ்வை நோக்கி உயர்கிறது. இதுதான்
            நீங்கள் ஒவ்வொரு தொழுகையிலும் சொல்லும் வார்த்தை.

      - id: learning-kabura-01
        role: learning
        form: "كُبْرَى"
