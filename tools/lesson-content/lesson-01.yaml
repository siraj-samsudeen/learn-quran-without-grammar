# ANCHOR — the phrase that ties the lesson together
# ============================================================

anchor:
  arabic: "اللهُ أَكْبَرُ"
  en: "Allah is Greater"
  ta: "அல்லாஹ் மிகப் பெரியவன்"
  context:
    en: |
      You say this every single day. Before every ṣalāh. You raise your
      hands and say it. The muaddhin opens with it. It is the first thing
      you hear when prayer is called, and the first thing you say when you
      stand before Allah. It is the most repeated phrase in your life.
    ta: |
      நீங்கள் இதை ஒவ்வொரு நாளும் சொல்கிறீர்கள். ஒவ்வொரு தொழுகைக்கும்
      முன். உங்கள் கைகளை உயர்த்தி இதைச் சொல்கிறீர்கள். முஅத்தின் இதனால்
      தொடங்குகிறார். தொழுகை அழைக்கப்படும்போது நீங்கள் முதலில் கேட்பது
      இதுதான், அல்லாஹ்வின் முன் நிற்கும்போது நீங்கள் முதலில் சொல்வதும்
      இதுதான். இது உங்கள் வாழ்க்கையில் அதிகம் திரும்பத்திரும்ப
      சொல்லப்படும் சொற்றொடர்.
  audio: adhan-allahu-akbar.mp3  # pre-built, not from Quran CDN

