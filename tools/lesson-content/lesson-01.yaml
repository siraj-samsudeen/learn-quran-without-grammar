        reciter: Husary_128kbps
        arabic_source: { surah: 79, ayah: 20 }
        arabic_text: "فَأَرَاهُ الْآيَةَ الْكُبْرَىٰ"
        en: "And he showed him the greatest sign"
        ta: "அவனுக்கு மிகப் பெரிய அத்தாட்சியைக் காட்டினான்"
        hook:
          en: >
            Mūsā showed Pharaoh something so overwhelming that this root
            had to be used — *the greatest*.
          ta: >
            மூஸா ஃபிர்அவ்னுக்கு மிகவும் பிரமிக்கத்தக்க ஒன்றைக்
            காட்டினார் — இந்த வேர்ச்சொல்லைப் பயன்படுத்த வேண்டிய
            அளவுக்கு — *மிகப் பெரிய*.

      - id: learning-kabura-02
        role: learning
        form: "كَبُرَ"
        ref: "61:3"
        reciter: Alafasy_128kbps
        arabic_source: { surah: 61, ayah: 3 }
        arabic_text: "كَبُرَ مَقْتًا عِندَ اللَّهِ أَن تَقُولُوا مَا لَا تَفْعَلُونَ"
        en: "Greatly hateful in the sight of Allah — that you say what you do not do"
        ta: "நீங்கள் செய்யாததைச் சொல்வது அல்லாஹ்விடம் மிகவும் வெறுப்புக்குரியது"
        hook:
          en: >
            This is the root word itself — **كَبُرَ** — in its simplest
            form. You can hear the three root letters clearly: kāf, bā, rā.
          ta: >
            இது வேர்ச்சொல்லே — **كَبُرَ** — அதன் எளிமையான
            வடிவத்தில். மூன்று வேர் எழுத்துக்களைத் தெளிவாகக்
            கேட்கலாம்: காஃப், பா, ரா.

      - id: learning-kabura-03
        role: learning
        form: "اسْتَكْبَرَ"
        ref: "2:34"
        reciter: Abdul_Basit_Mujawwad_128kbps
        arabic_source: { surah: 2, ayah: 34 }
        arabic_text: "وَإِذْ قُلْنَا لِلْمَلَائِكَةِ اسْجُدُوا لِآدَمَ فَسَجَدُوا إِلَّا إِبْلِيسَ أَبَىٰ وَاسْتَكْبَرَ وَكَانَ مِنَ الْكَافِرِينَ"
        en: "And when We said to the angels: Prostrate to Adam — they all prostrated, except Iblis. He refused and was arrogant, and became of the disbelievers."
        ta: "மலக்குகளிடம் ஆதமுக்கு சஜ்தா செய்யுங்கள் என்று நாம் கூறியபோது — இப்லீஸைத் தவிர அனைவரும் சஜ்தா செய்தார்கள். அவன் மறுத்தான், ஆணவம் கொண்டான், நிராகரிப்பவர்களில் ஒருவனானான்."
        hook:
          en: >
            The origin story of arrogance. When the angels were commanded
            to bow, every single one obeyed — except one. He claimed
            greatness for himself, and that is what this word means.
          ta: >
            ஆணவத்தின் தோற்றக் கதை. மலக்குகள் சிரம் பணியக்
            கட்டளையிடப்பட்டபோது, ஒவ்வொருவரும் கீழ்ப்படிந்தார்கள் —
            ஒருவனைத் தவிர. அவன் தனக்கே மகத்துவத்தை உரிமை
            கொண்டாடினான் — இந்த வார்த்தையின் பொருள் அதுதான்.

