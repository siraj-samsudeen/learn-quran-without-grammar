# Lesson {{NN}} Audio Definition
# ─────────────────────────────
# This file drives the audio build pipeline.
# Copy this template, fill in the slots, then run:
#
#   tools/rebuild-lesson-audio.sh lesson-{{NN}}
#
# Validate afterwards:
#   python tools/validate-lesson-consistency.py lesson-{{NN}}

lesson_id: lesson-{{NN}}
title: "Lesson {{N}}: {{Title}}"
slug: lesson-{{NN}}-{{slug}}

sentences:

  # ── Anchor: Root 1 ──────────────────────────────────────────
  - id: anchor-{{root1-ascii}}
    role: anchor
    root: {{root1-ascii}}               # ASCII slug (e.g., "ilah")
    form: {{form-ascii}}                # ASCII form name (e.g., "ilah")
    ref: "{{SS:AA}}"                    # e.g., "59:22"
    reciter: {{ReciterFolder}}          # Must match EveryAyah folder name
    arabic_source:
      surah: {{SSS}}                    # Integer (e.g., 59)
      ayah: {{AAA}}                     # Integer (e.g., 22)
      start: null                       # seconds — null for full ayah
      end: null                         # seconds — null for full ayah
    arabic_source_full:                 # Full ayah for review audio
      surah: {{SSS}}                    # Omit this block if no trimming
      ayah: {{AAA}}
    arabic_text: "{{Arabic text}}"
    english: "{{Plain ASCII English}}"  # ⚠️ NO ā ī ū ṣ ʿ — TTS gibberish!

  # ── Anchor: Root 2 ──────────────────────────────────────────
  - id: anchor-{{root2-ascii}}
    role: anchor
    root: {{root2-ascii}}
    form: {{form-ascii}}
    ref: ""                             # Empty for teaching phrases
    reciter: null                       # null for Arabic TTS
    arabic_source:
      use_arabic_tts: true              # For non-Qur'anic content
    arabic_text: "{{Arabic text}}"
    english: "{{Plain ASCII English}}"

  # ── Learning: Root 1 ─────────────────────────────────────────
  - id: learning-{{root1}}-01
    role: learning
    root: {{root1-ascii}}
    form: {{form-ascii}}
    ref: "{{SS:AA}}"
    reciter: {{ReciterFolder}}          # Different from anchor reciter!
    arabic_source:
      surah: {{SSS}}
      ayah: {{AAA}}
      start: {{seconds or null}}        # Use auto-timestamps.py to find these
      end: {{seconds or null}}
    arabic_source_full:                 # Include if trimmed (learning uses fragment, review uses full)
      surah: {{SSS}}
      ayah: {{AAA}}
    arabic_text: "{{Arabic text}}"
    english: "{{Plain ASCII English}}"

  - id: learning-{{root1}}-02
    role: learning
    # ... same structure ...

  # ── Learning: Root 2 ────────────────────────────────────────
  - id: learning-{{root2}}-01
    role: learning
    # ... same structure ...

  - id: learning-{{root2}}-02
    role: learning
    # ...

  # ── Learning: additional phrases (up to 9 total) ────────────
  # Budget: 10 phrases / 100 words for new content (including anchor).
  # Add more learning phrases as needed, numbered sequentially.

  - id: learning-05
    role: learning
    # ...

# ── Reciter Assignment Checklist ──────────────────────────────
# Each phrase MUST use a different reciter. Use this checklist:
#
# ☐ anchor:          _______________
# ☐ learning-01:     _______________
# ☐ learning-02:     _______________
# ☐ learning-03:     _______________
# ☐ learning-04:     _______________
# ☐ learning-05:     _______________
# ☐ learning-06:     _______________
# ☐ learning-07:     _______________
# ☐ learning-08:     _______________
# ☐ learning-09:     _______________
# (add recall entries as needed)
#
# Speed matching: slow (≤5 words) → Husary, Abdul Basit, Hani Rifai
#                 medium (6-10)   → Hudhaifi, Alafasy, Abu Bakr
#                 fast (11+)      → Yasser ⭐, As-Sudais, Maher, Juhainy, Ghamdi
