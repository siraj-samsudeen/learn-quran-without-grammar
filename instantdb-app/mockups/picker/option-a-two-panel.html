<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Option A — Two-Panel + Order Strip (Lesson 1)</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf8f3;
    --card: #ffffff;
    --ink: #1a1a1a;
    --muted: #6b6b6b;
    --border: #e5e5e5;
    --learning: #0f766e;
    --learning-bg: #ccfbf1;
    --pipeline: #6b7280;
    --pipeline-bg: #f3f4f6;
    --accent: #4338ca;
    --accent-bg: #e0e7ff;
    --good: #16a34a;
    --warn: #d97706;
    --danger: #dc2626;
    --sidebar-w: 250px;
  }
  * { box-sizing: border-box; margin: 0; }
  body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--ink); line-height: 1.5; }

  .layout { display: grid; grid-template-columns: var(--sidebar-w) 1fr; grid-template-rows: auto 1fr; height: 100vh; }

  /* HEADER */
  .header { grid-column: 1/-1; background: white; border-bottom: 1px solid var(--border); padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 1.1rem; font-weight: 700; }
  .header .sub { font-size: 0.82rem; color: var(--muted); margin-top: 0.15rem; }
  .header-right { display: flex; gap: 0.75rem; align-items: center; }
  .counter-pill { display: flex; align-items: center; gap: 0.3rem; padding: 0.35rem 0.75rem; border-radius: 999px; font-size: 0.8rem; font-weight: 600; border: 2px solid var(--border); background: white; }
  .counter-pill.filled { background: var(--learning-bg); border-color: var(--learning); color: var(--learning); }

  /* SIDEBAR */
  .sidebar { background: white; border-right: 1px solid var(--border); padding: 0.75rem 0; overflow-y: auto; }
  .root-header { padding: 0.6rem 1.25rem; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; border-left: 3px solid transparent; transition: all 0.12s; }
  .root-header:hover { background: #f9fafb; }
  .root-header.active { background: var(--accent-bg); border-left-color: var(--accent); }
  .root-header .root-arabic { font-family: 'Amiri', serif; font-size: 1.35rem; font-weight: 700; }
  .root-header .root-trans { font-size: 0.78rem; color: var(--muted); font-weight: 500; }
  .root-header .collapse-toggle { margin-left: auto; background: none; border: none; color: var(--muted); font-size: 0.85rem; cursor: pointer; padding: 0.15rem 0.35rem; border-radius: 4px; transition: all 0.15s; line-height: 1; }
  .root-header .collapse-toggle:hover { background: #e5e7eb; color: var(--ink); }
  .root-header .collapse-toggle.collapsed { transform: rotate(-90deg); }
  .root-forms-group { overflow: hidden; transition: max-height 0.25s ease; }
  .root-forms-group.collapsed { max-height: 0 !important; }
  .root-divider { margin: 0.6rem 1.25rem; border: none; border-top: 1px dashed var(--border); }
  .form-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.45rem 1.25rem 0.45rem 1.75rem; cursor: pointer; border-left: 3px solid transparent; transition: all 0.12s; font-size: 0.85rem; }
  .form-item:hover { background: #f9fafb; }
  .form-item.active { background: var(--accent-bg); border-left-color: var(--accent); }
  .form-item .status-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .form-item .status-dot.covered { background: var(--good); }
  .form-item .status-dot.uncovered { background: var(--border); border: 2px solid var(--muted); }
  .form-item .status-dot.empty { background: #fef3c7; border: 2px solid var(--warn); }
  .form-item .form-arabic { font-family: 'Amiri', serif; font-size: 1.1rem; font-weight: 700; }
  .all-roots-header { padding: 0.6rem 1.25rem; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; border-left: 3px solid transparent; transition: all 0.12s; border-bottom: 1px solid var(--border); margin-bottom: 0.25rem; }
  .all-roots-header:hover { background: #f9fafb; }
  .all-roots-header.active { background: var(--accent-bg); border-left-color: var(--accent); }
  .all-roots-header .all-label { font-size: 0.85rem; font-weight: 700; }
  .all-roots-header .all-count { margin-left: auto; font-size: 0.72rem; font-weight: 600; font-variant-numeric: tabular-nums; color: var(--muted); padding: 0.1rem 0.45rem; border-radius: 4px; background: #f3f4f6; }
  .all-roots-header .all-count.has-picks { background: var(--learning-bg); color: var(--learning); }
  .root-header .root-count { margin-left: auto; font-size: 0.72rem; font-weight: 600; font-variant-numeric: tabular-nums; color: var(--muted); padding: 0.1rem 0.45rem; border-radius: 4px; background: #f3f4f6; }
  .root-header .root-count.has-picks { background: var(--learning-bg); color: var(--learning); }
  .form-item .form-selection { margin-left: auto; font-size: 0.72rem; font-weight: 600; font-variant-numeric: tabular-nums; color: var(--muted); padding: 0.1rem 0.45rem; border-radius: 4px; background: #f3f4f6; }
  .form-item .form-selection.has-picks { background: var(--learning-bg); color: var(--learning); }
  .form-item.active .form-selection { background: var(--accent); color: white; }

  /* MAIN */
  main { padding: 1.25rem 2rem 2rem; overflow-y: auto; }
  .main-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); }
  .main-header h2 { font-size: 1rem; display: flex; align-items: center; gap: 0.5rem; }
  .main-header h2 .hdr-arabic { font-family: 'Amiri', serif; font-size: 1.3rem; }
  .main-header .sort-controls { display: flex; gap: 0.4rem; }
  .sort-btn { border: 1.5px solid var(--border); background: white; padding: 0.3rem 0.65rem; border-radius: 6px; font-size: 0.74rem; font-weight: 600; cursor: pointer; font-family: inherit; color: var(--muted); }
  .sort-btn.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }

  /* CARDS */
  .cards { display: grid; gap: 0.8rem; }
  .card { background: var(--card); border: 1.5px solid var(--border); border-left: 5px solid var(--border); border-radius: 10px; padding: 1rem 1.2rem; transition: all 0.15s; }
  .card.learning { border-left-color: var(--learning); background: #f0fdfa; }
  .card.pipeline { border-left-color: var(--pipeline); opacity: 0.7; }
  .card-top { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; margin-bottom: 0.4rem; flex-wrap: wrap; }
  .card-left { display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; }
  .ref { font-weight: 700; font-size: 0.95rem; }
  .badge { padding: 0.12rem 0.5rem; border-radius: 5px; font-size: 0.72rem; font-weight: 600; }
  .badge.form { background: var(--accent-bg); color: var(--accent); }
  .badge.score { background: #fef9c3; color: #854d0e; }
  .badge.score-high { background: #dcfce7; color: var(--good); }
  .badge.words { background: #f3f4f6; color: var(--muted); }
  .card-actions { display: flex; gap: 0.3rem; }
  .card-actions button { border: 1.5px solid var(--border); background: white; padding: 0.3rem 0.6rem; border-radius: 6px; font-size: 0.74rem; font-weight: 600; cursor: pointer; font-family: inherit; color: var(--muted); transition: all 0.1s; }
  .card-actions button:hover { border-color: var(--ink); color: var(--ink); }
  .card-actions button.active { background: var(--learning); border-color: var(--learning); color: white; }
  .card-actions button.active-pipeline { background: var(--pipeline); border-color: var(--pipeline); color: white; }
  .arabic { font-family: 'Amiri', serif; font-size: 1.35rem; line-height: 2; direction: rtl; text-align: right; margin: 0.5rem 0 0.3rem; }
  .english { font-style: italic; color: #374151; font-size: 0.88rem; margin-bottom: 0.5rem; }
  .score-breakdown { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.4rem; }
  .score-dim { font-size: 0.7rem; padding: 0.15rem 0.4rem; border-radius: 4px; background: #f9fafb; color: var(--muted); border: 1px solid #e5e7eb; }
  .score-dim .dl { font-weight: 600; }
  .score-dim.high { background: #dcfce7; color: #166534; border-color: #bbf7d0; }
  .score-dim.medium { background: #fef9c3; color: #854d0e; border-color: #fde68a; }
  .score-dim.low { background: #fef2f2; color: #991b1b; border-color: #fecaca; }
  .why { color: var(--muted); font-size: 0.82rem; margin-top: 0.3rem; padding: 0.4rem 0.6rem; background: #fafafa; border-radius: 6px; border: 1px dashed var(--border); }
  .no-verses { color: var(--muted); font-size: 0.9rem; font-style: italic; padding: 2rem; text-align: center; }

  /* Form sub-header in "all" view */
  .form-subheader { background: var(--accent-bg); color: var(--accent); padding: 0.4rem 0.75rem; border-radius: 6px; font-size: 0.82rem; font-weight: 700; margin: 1.25rem 0 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
  .form-subheader:first-child { margin-top: 0; }
  .form-subheader .fsh-arabic { font-family: 'Amiri', serif; font-size: 1.1rem; }

</style>
</head>

<div class="layout">
  <div class="header">
    <div>
      <h1>Lesson 1 — Selection Picker</h1>

  <div class="sidebar" id="sidebar"></div>

  <main id="main-content"></main>

</div>

// ════════════════════════════════════════════════
// STATE & RENDERING
// ════════════════════════════════════════════════

let activeFilter = { type: "all" };
let sortBy = "words";

function getVersesForForm(rootKey, formArabic) {
  return VERSES.filter(v => v.root === rootKey && v.form === formArabic);
}
function getVersesForRoot(rootKey) {
  return VERSES.filter(v => v.root === rootKey);
}
function getSelectedVerses() {
  return VERSES.filter(v => v.status === "learning").sort((a,b) => a.words - b.words);
}

function computeFormStats() {
  const stats = {};
  ROOTS.forEach(r => {
    r.forms.forEach(f => {
      const key = r.key + "|" + f.arabic;
      const verses = VERSES.filter(v => v.root === r.key && v.form === f.arabic);
      const selected = verses.filter(v => v.status === "learning").length;
      stats[key] = { total: f.count, selected };
    });
  });
  return stats;
}

function renderSidebar() {
  const stats = computeFormStats();
  let html = "";

  // All roots header
  const allSelected = VERSES.filter(v => v.status === "learning").length;
  const allTotal = ROOTS.reduce((s, r) => s + r.forms.reduce((s2, f) => s2 + f.count, 0), 0);
  const allClass = activeFilter.type === "all" ? "active" : "";
  const allCountClass = allSelected > 0 ? "has-picks" : "";
  html += `<div class="all-roots-header ${allClass}" onclick="clickAll()">
    <span class="all-label">All roots</span>
    <span class="all-count ${allCountClass}">${allSelected}/${allTotal}</span>
  </div>`;

  ROOTS.forEach((root, ri) => {
    if (ri > 0) html += '<hr class="root-divider">';

    // Root-level count
    const rootSelected = VERSES.filter(v => v.root === root.key && v.status === "learning").length;
    const rootTotal = root.forms.reduce((s, f) => s + f.count, 0);
    const isRootActive = activeFilter.type === "root" && activeFilter.rootKey === root.key;
    const rootCountClass = rootSelected > 0 ? "has-picks" : "";

    html += `<div class="root-header ${isRootActive ? 'active' : ''}" onclick="clickRoot('${root.key}')">
      <span class="root-arabic">${root.arabic}</span>
      <span class="root-trans">${root.trans}</span>
      <span class="root-count ${rootCountClass}">${rootSelected}/${rootTotal}</span>
      <button class="collapse-toggle" onclick="toggleRoot(event, '${root.key}')" title="Collapse">&#9660;</button>
    </div>`;
    html += `<div class="root-forms-group" id="root-${root.key}">`;

    root.forms.forEach(f => {
      const key = root.key + "|" + f.arabic;
      const s = stats[key] || { total: 0, selected: 0 };
      const isActive = activeFilter.type === "form" && activeFilter.rootKey === root.key && activeFilter.formArabic === f.arabic;
      const pickerVerses = VERSES.filter(v => v.root === root.key && v.form === f.arabic).length;
      let dotClass = "uncovered";
      if (s.selected > 0) dotClass = "covered";
      else if (pickerVerses > 0) dotClass = "empty";
      const selClass = s.selected > 0 ? "has-picks" : "";

      html += `<div class="form-item ${isActive ? 'active' : ''}" onclick="clickForm('${root.key}','${f.arabic}')">
        <span class="status-dot ${dotClass}"></span>
        <span class="form-arabic">${f.arabic}</span>
        <span class="form-selection ${selClass}">${s.selected}/${s.total}</span>
      </div>`;
    });

    html += '</div>';
  });

  document.getElementById("sidebar").innerHTML = html;
}

function renderMain() {
  let verses;
  let title, gloss, countBadge;

  if (activeFilter.type === "form") {
    verses = getVersesForForm(activeFilter.rootKey, activeFilter.formArabic);
    const root = ROOTS.find(r => r.key === activeFilter.rootKey);
    const form = root.forms.find(f => f.arabic === activeFilter.formArabic);
    title = form.arabic;
    gloss = form.gloss;
    const sel = verses.filter(v => v.status === "learning").length;
    countBadge = sel + "/" + form.count;
  } else if (activeFilter.type === "root") {
    verses = getVersesForRoot(activeFilter.rootKey);
    const root = ROOTS.find(r => r.key === activeFilter.rootKey);
    title = root.arabic;
    gloss = "all forms";
    const sel = verses.filter(v => v.status === "learning").length;
    const total = root.forms.reduce((s,f) => s + f.count, 0);
    countBadge = sel + "/" + total;
  } else {
    // all
    verses = [...VERSES];
    title = "All roots";
    gloss = "";
    const sel = verses.filter(v => v.status === "learning").length;
    const total = ROOTS.reduce((s, r) => s + r.forms.reduce((s2, f) => s2 + f.count, 0), 0);
    countBadge = sel + "/" + total;
  }

  // Sort
  if (sortBy === "score") verses.sort((a,b) => b.score - a.score);
  else if (sortBy === "words") verses.sort((a,b) => a.words - b.words);

  let html = `<div class="main-header">
    <h2><span class="hdr-arabic">${title}</span>
      ${gloss ? `<span style="color:var(--muted);font-size:0.82rem">— ${gloss}</span>` : ''}
      <span class="badge form">${countBadge}</span>
    </h2>
    <div class="sort-controls">
      <button class="sort-btn ${sortBy==='score'?'active':''}" onclick="setSort('score')">Score</button>
      <button class="sort-btn ${sortBy==='words'?'active':''}" onclick="setSort('words')">Words</button>
    </div>
  </div>`;

  if (verses.length === 0) {
    html += '<div class="no-verses">No verses available for this form yet</div>';
  } else if (activeFilter.type === "root" || activeFilter.type === "all") {
    // Group by root then form
    const rootOrder = activeFilter.type === "all" ? ROOTS : [ROOTS.find(r => r.key === activeFilter.rootKey)];
    rootOrder.forEach(root => {
      const rootVerses = verses.filter(v => v.root === root.key);
      if (rootVerses.length === 0) return;
      if (activeFilter.type === "all") {
        const rSel = rootVerses.filter(v => v.status === "learning").length;
        const rTotal = root.forms.reduce((s, f) => s + f.count, 0);
        html += `<div class="form-subheader" style="background:#f0f9ff;color:#1e40af;font-size:0.9rem;margin-top:1.5rem"><span class="fsh-arabic" style="font-size:1.2rem">${root.arabic}</span> ${root.trans} <span style="margin-left:auto;font-size:0.75rem">${rSel}/${rTotal}</span></div>`;
      }
      const grouped = {};
      rootVerses.forEach(v => {
        if (!grouped[v.form]) grouped[v.form] = [];
        grouped[v.form].push(v);
      });
      root.forms.forEach(f => {
        const gv = grouped[f.arabic];
        if (!gv || gv.length === 0) return;
        const sel = gv.filter(v => v.status === "learning").length;
        html += `<div class="form-subheader"><span class="fsh-arabic">${f.arabic}</span> ${f.gloss} <span style="margin-left:auto;font-size:0.75rem">${sel}/${f.count}</span></div>`;
        html += '<div class="cards">';
        if (sortBy === "score") gv.sort((a,b) => b.score - a.score);
        else gv.sort((a,b) => a.words - b.words);
        gv.forEach(v => { html += renderCard(v); });
        html += '</div>';
      });
    });
  } else {
    html += '<div class="cards">';
    verses.forEach(v => { html += renderCard(v); });
    html += '</div>';
  }

  document.getElementById("main-content").innerHTML = html;
}

function renderCard(v) {
  const cls = v.status === "learning" ? "learning" : v.status === "pipeline" ? "pipeline" : "";
  const scoreClass = v.score >= 20 ? "score-high" : "score";
  const s = v.scores;

  function dimClass(val) { return val >= 7 ? "high" : val >= 4 ? "medium" : val <= 2 ? "low" : ""; }

  return `<div class="card ${cls}">
    <div class="card-top">
      <div class="card-left">
        <span class="ref">${v.ref}</span>
        <span class="badge form">${v.form}</span>
        <span class="badge ${scoreClass}">&#9733; ${v.score}</span>
        <span class="badge words">${v.words} words</span>
      </div>
      <div class="card-actions">
        <button class="${v.status==='none'?'active':''}" onclick="setStatus('${v.ref}','none')">None</button>
        <button class="${v.status==='learning'?'active':''}" onclick="setStatus('${v.ref}','learning')">Learning</button>
        <button class="${v.status==='pipeline'?'active-pipeline':''}" onclick="setStatus('${v.ref}','pipeline')">Pipeline</button>
      </div>
    </div>
    <div class="arabic">${v.arabic}</div>
    <div class="english">"${v.english}"</div>
    <div class="score-breakdown">
      <span class="score-dim ${dimClass(s.story)}"><span class="dl">story</span> ${s.story}</span>
      <span class="score-dim ${dimClass(s.fam)}"><span class="dl">fam</span> ${s.fam}</span>
      <span class="score-dim ${dimClass(s.fit)}"><span class="dl">fit</span> ${s.fit}</span>
    </div>
    <div class="why">${v.why}</div>
  </div>`;
}

// ════════════════════════════════════════════════
// EVENT HANDLERS
// ════════════════════════════════════════════════

function clickAll() {
  activeFilter = { type: "all" };
  render();
}
function clickForm(rootKey, formArabic) {
  activeFilter = { type: "form", rootKey, formArabic };
  render();
}
function clickRoot(rootKey) {
  activeFilter = { type: "root", rootKey };
  render();
}
function toggleRoot(e, rootKey) {
  e.stopPropagation();
  const group = document.getElementById('root-' + rootKey);
  const btn = e.currentTarget;
  group.classList.toggle('collapsed');
  btn.classList.toggle('collapsed');
}
function setSort(s) {
  sortBy = s;
  renderMain();
}
function setStatus(ref, status) {
  const v = VERSES.find(v => v.ref === ref);
  if (v) v.status = status;
  render();
}
function render() {
  renderSidebar();
  renderMain();
  // Update header pill
  const sel = VERSES.filter(v => v.status === "learning").length;
  document.getElementById("learning-count").textContent = sel + " / 10";
  document.getElementById("learning-pill").classList.toggle("filled", sel >= 10);
}

// Initial render
render();
</script>
