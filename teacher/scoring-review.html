   arabic:"وَمَا ٱلْحَيَوٰةُ ٱلدُّنْيَآ إِلَّا لَعِبٌ وَلَهْوٌ ۖ وَلَلدَّارُ ٱلْـَٔاخِرَةُ خَيْرٌ لِّلَّذِينَ يَتَّقُونَ ۗ أَفَلَا تَعْقِلُونَ",
   trans:"And the worldly life is not but amusement and diversion; but the home of the Hereafter is best for those who fear Allah, so will you not reason?",
   t1:{len:0,frq:8,dom:4}, t2:{sto:3,fam:2,fit:6},
   notes:{len:"15 words",frq:"—",dom:"—",sto:"Declarative comparison: \'worldly life is play and amusement.\' Philosophical but no narrative.",fam:"Al-An\'am — Tier D. Not commonly recited independently.",fit:"حَيَوٰة ٱلدُّنْيَا is the subject — \'worldly life is nothing but play.\' Root is central to the comparison."}},
  {ref:"2:86",root:"hayiya",rootAr:"حَيِيَ",form:"حَياة",formEn:"hayiya",role:"candidate",lesson:4,
   arabic:"أُو۟لَٰٓئِكَ ٱلَّذِينَ ٱشْتَرَوُا۟ ٱلْحَيَوٰةَ ٱلدُّنْيَا بِٱلْـَٔاخِرَةِ ۖ فَلَا يُخَفَّفُ عَنْهُمُ ٱلْعَذَابُ وَلَا هُمْ يُنصَرُونَ",
   trans:"Those are the ones who have bought the life of this world [in exchange] for the Hereafter, so the punishment will not be lightened for them, nor will they be aided.",
   t1:{len:0,frq:8,dom:4}, t2:{sto:3,fam:2,fit:5},
   notes:{len:"14 words",frq:"—",dom:"—",sto:"Warning about those who traded the Hereafter for worldly life. Consequence-focused, no narrative.",fam:"Al-Baqarah — Tier D. Not independently famous.",fit:"ٱلْحَيَوٰةَ ٱلدُّنْيَا is a key phrase — \'bought the worldly life for the Hereafter\' — but the verse focuses on punishment."}},
  {ref:"3:185",root:"hayiya",rootAr:"حَيِيَ",form:"حَياة",formEn:"hayiya",role:"candidate",lesson:4,
   arabic:"كُلُّ نَفْسٍ ذَآئِقَةُ ٱلْمَوْتِ ۗ وَإِنَّمَا تُوَفَّوْنَ أُجُورَكُمْ يَوْمَ ٱلْقِيَٰمَةِ ۖ فَمَن زُحْزِحَ عَنِ ٱلنَّارِ وَأُدْخِلَ ٱلْجَنَّةَ فَقَدْ فَازَ ۗ وَمَا ٱلْحَيَوٰةُ ٱلدُّنْيَآ إِلَّا مَتَٰعُ ٱلْغُرُورِ",
   trans:"Every soul will taste death, and you will only be given your [full] compensation on the Day of Resurrection. So he who is drawn away from the Fire and admitted to Paradise has attained [his desire]. And what is the life of this world except the enjoyment of delusion.",
   t1:{len:0,frq:8,dom:4}, t2:{sto:7,fam:6,fit:4},
   notes:{len:"26 words",frq:"—",dom:"—",sto:"Iconic verse: \'Every soul will taste death... whoever is saved from Fire and enters Paradise has succeeded.\' Emotionally powerful climax.",fam:"1. Very famous ayah, widely quoted in funeral contexts and khutbahs. 2. \'Every soul will taste death\' is among the most-recognized phrases.",fit:"حَيَوٰة appears as \'worldly life is but enjoyment of delusion\' — present but not the verse\'s main teaching. 26 words, long."}},
  // ---- L4 salah (صَلَاة) ----
  {ref:"107:5",root:"salah",rootAr:"صَلَاة",form:"صَلاة",formEn:"salah",role:"anchor",lesson:4,
   arabic:"ٱلَّذِينَ هُمْ عَن صَلَاتِهِمْ سَاهُونَ",
   trans:"[But] who are heedless of their prayer -",
   t1:{len:5,frq:8,dom:8}, t2:{sto:4,fam:9,fit:9},
   notes:{len:"5 words",frq:"—",dom:"—",sto:"Warning about those heedless of prayer — contrast with good prayer. Slight emotional sting.",fam:"Al-Ma\'un — Tier A surah, among the shortest, memorized by nearly every Muslim.",fit:"صَلَاتِهِمْ is the core — \'heedless of their prayer.\' 1. Prayer is the entire subject. 2. Already memorized, instant recognition."}},
  {ref:"6:162",root:"salah",rootAr:"صَلَاة",form:"صَلاة",formEn:"salah",role:"learning",lesson:4,
   arabic:"قُلْ إِنَّ صَلَاتِى وَنُسُكِى وَمَحْيَاىَ وَمَمَاتِى لِلَّهِ رَبِّ ٱلْعَٰلَمِينَ",
   trans:"Say, \"Indeed, my prayer, my rites of sacrifice, my living and my dying are for Allah, Lord of the worlds.",
   t1:{len:1,frq:8,dom:8}, t2:{sto:6,fam:5,fit:8},
   notes:{len:"9 words",frq:"—",dom:"—",sto:"Personal declaration: \'My prayer, my sacrifice, my living and dying are for Allah.\' Emotionally powerful personal commitment.",fam:"Well-known ayah, frequently recited as a personal supplication. Often quoted in khutbahs.",fit:"صَلَاتِى (my prayer) is the opening declaration. 1. Prayer is listed first among four life-encompassing acts. 2. Personal possessive form is powerful for teaching."}},
  {ref:"23:2",root:"salah",rootAr:"صَلَاة",form:"صَلاة",formEn:"salah",role:"learning",lesson:4,
   arabic:"ٱلَّذِينَ هُمْ فِى صَلَاتِهِمْ خَٰشِعُونَ",
   trans:"They who are during their prayer humbly submissive",
   t1:{len:5,frq:8,dom:8}, t2:{sto:3,fam:4,fit:8},
   notes:{len:"5 words",frq:"—",dom:"—",sto:"Description of successful believers\' qualities. No narrative, but emotionally aspirational.",fam:"Al-Mu\'minun — Tier C/D. Opening passage is somewhat well-known but surah not regularly recited.",fit:"صَلَاتِهِمْ is central — \'humbly submissive in their prayer.\' Entire verse is about the quality of prayer."}},
  {ref:"2:238",root:"salah",rootAr:"صَلَاة",form:"صَلاة",formEn:"salah",role:"learning",lesson:4,
   arabic:"حَٰفِظُوا۟ عَلَى ٱلصَّلَوَٰتِ وَٱلصَّلَوٰةِ ٱلْوُسْطَىٰ وَقُومُوا۟ لِلَّهِ قَٰنِتِينَ",
   trans:"Maintain with care the [obligatory] prayers and [in particular] the middle prayer and stand before Allah, devoutly obedient.",
   t1:{len:2,frq:8,dom:8}, t2:{sto:3,fam:5,fit:9},
   notes:{len:"8 words",frq:"—",dom:"—",sto:"Command to maintain prayers, especially the middle prayer. Slightly more specific than generic commands.",fam:"Well-known ayah about prayer times. Often quoted in discussions about the \'middle prayer.\'",fit:"1. ٱلصَّلَوَٰتِ AND ٱلصَّلَوٰةِ both appear — double occurrence of root. 2. Entire verse is exclusively about prayer. 3. \'Middle prayer\' specificity is unique."}},
  {ref:"19:55",root:"salah",rootAr:"صَلَاة",form:"صَلاة",formEn:"salah",role:"learning",lesson:4,
   arabic:"وَكَانَ يَأْمُرُ أَهْلَهُۥ بِٱلصَّلَوٰةِ وَٱلزَّكَوٰةِ وَكَانَ عِندَ رَبِّهِۦ مَرْضِيًّا",
   trans:"And he used to enjoin on his people prayer and zakah and was to his Lord pleasing.",
   t1:{len:1,frq:8,dom:8}, t2:{sto:7,fam:4,fit:7},
   notes:{len:"9 words",frq:"—",dom:"—",sto:"Story of Prophet Isma\'il: \'He used to command his family to pray.\' Specific prophet, specific action, pleasing to his Lord.",fam:"Maryam — Tier C surah. This ayah about Isma\'il is moderately known.",fit:"ٱلصَّلَوٰةِ is a key action — Isma\'il commanding prayer. Good narrative wrapper for the root meaning."}},
  {ref:"23:9",root:"salah",rootAr:"صَلَاة",form:"صَلاة",formEn:"salah",role:"learning",lesson:4,
   arabic:"وَٱلَّذِينَ هُمْ عَلَىٰ صَلَوَٰتِهِمْ يُحَافِظُونَ",
   trans:"And they who carefully maintain their prayers -",
   t1:{len:5,frq:8,dom:8}, t2:{sto:2,fam:4,fit:8},
   notes:{len:"5 words",frq:"—",dom:"—",sto:"List item in a catalogue of believer qualities. No narrative.",fam:"Al-Mu\'minun — Tier C/D. Part of the well-known opening passage.",fit:"صَلَوَٰتِهِمْ is central — \'carefully maintain their prayers.\' Prayer is the entire subject."}},
  {ref:"2:45",root:"salah",rootAr:"صَلَاة",form:"صَلاة",formEn:"salah",role:"learning",lesson:4,
   arabic:"وَٱسْتَعِينُوا۟ بِٱلصَّبْرِ وَٱلصَّلَوٰةِ ۚ وَإِنَّهَا لَكَبِيرَةٌ إِلَّا عَلَى ٱلْخَٰشِعِينَ",
   trans:"And seek help through patience and prayer, and indeed, it is difficult except for the humbly submissive [to Allah]",
   t1:{len:1,frq:8,dom:8}, t2:{sto:4,fam:5,fit:8},
   notes:{len:"9 words",frq:"—",dom:"—",sto:"Encouragement to seek help through patience and prayer — emotionally supportive tone, gentle.",fam:"Well-known ayah, often quoted as consolation. \'Seek help through patience and prayer\' is widely recognized.",fit:"ٱلصَّلَوٰةِ is one of two pillars of the verse. 1. Prayer is presented as a source of strength. 2. Unique angle — prayer as help, not just obligation."}},
  {ref:"70:23",root:"salah",rootAr:"صَلَاة",form:"صَلاة",formEn:"salah",role:"learning",lesson:4,
   arabic:"ٱلَّذِينَ هُمْ عَلَىٰ صَلَاتِهِمْ دَآئِمُونَ",
   trans:"Those who are constant in their prayer",
   t1:{len:5,frq:8,dom:8}, t2:{sto:2,fam:3,fit:8},
   notes:{len:"5 words",frq:"—",dom:"—",sto:"Attribute of the righteous. No narrative, purely descriptive.",fam:"Al-Ma\'arij — Tier D. Not commonly recited independently.",fit:"صَلَاتِهِمْ is central — \'constant in their prayer.\' Short, clear, prayer-focused."}},
  {ref:"2:43",root:"salah",rootAr:"صَلَاة",form:"صَلاة",formEn:"salah",role:"learning",lesson:4,
   arabic:"وَأَقِيمُوا۟ ٱلصَّلَوٰةَ وَءَاتُوا۟ ٱلزَّكَوٰةَ وَٱرْكَعُوا۟ مَعَ ٱلرَّٰكِعِينَ",
   trans:"And establish prayer and give zakah and bow with those who bow [in worship and obedience].",
   t1:{len:3,frq:8,dom:8}, t2:{sto:2,fam:5,fit:7},
   notes:{len:"7 words",frq:"—",dom:"—",sto:"Direct command: establish prayer, give zakah, bow. No narrative.",fam:"Al-Baqarah — Tier D surah overall, but this is a well-known command verse, often quoted.",fit:"ٱلصَّلَوٰةَ is a key command word, but shares the verse with zakah and bowing. Prayer is one of three pillars mentioned."}},
  {ref:"70:34",root:"salah",rootAr:"صَلَاة",form:"صَلاة",formEn:"salah",role:"learning",lesson:4,
   arabic:"وَٱلَّذِينَ هُمْ عَلَىٰ صَلَاتِهِمْ يُحَافِظُونَ",
   trans:"And those who [carefully] maintain their prayer:",
   t1:{len:5,frq:8,dom:8}, t2:{sto:2,fam:3,fit:7},
   notes:{len:"5 words",frq:"—",dom:"—",sto:"Near-duplicate of 70:23 and 23:9. Attribute list, no narrative.",fam:"Al-Ma\'arij — Tier D. Not commonly recited.",fit:"صَلَاتِهِمْ is central but this is essentially the same verse as 23:9. Redundant for teaching."}},
  {ref:"2:3",root:"salah",rootAr:"صَلَاة",form:"صَلاة",formEn:"salah",role:"candidate",lesson:4,
   arabic:"ٱلَّذِينَ يُؤْمِنُونَ بِٱلْغَيْبِ وَيُقِيمُونَ ٱلصَّلَوٰةَ وَمِمَّا رَزَقْنَٰهُمْ يُنفِقُونَ",
   trans:"Who believe in the unseen, establish prayer, and spend out of what We have provided for them,",
   t1:{len:2,frq:8,dom:8}, t2:{sto:2,fam:6,fit:6},
   notes:{len:"8 words",frq:"—",dom:"—",sto:"Description of the righteous at the start of Al-Baqarah. Attribute list, no narrative.",fam:"Al-Baqarah opening — these first few ayat are well-known and frequently recited.",fit:"ٱلصَّلَوٰةَ is present — \'establish prayer\' — but shares focus with belief in unseen and spending."}},
  {ref:"2:153",root:"salah",rootAr:"صَلَاة",form:"صَلاة",formEn:"salah",role:"candidate",lesson:4,
   arabic:"يَٰٓأَيُّهَا ٱلَّذِينَ ءَامَنُوا۟ ٱسْتَعِينُوا۟ بِٱلصَّبْرِ وَٱلصَّلَوٰةِ ۚ إِنَّ ٱللَّهَ مَعَ ٱلصَّٰبِرِينَ",
   trans:"O you who have believed, seek help through patience and prayer. Indeed, Allah is with the patient.",
   t1:{len:0,frq:8,dom:8}, t2:{sto:4,fam:5,fit:7},
   notes:{len:"11 words",frq:"—",dom:"—",sto:"Direct address: \'O you who believe, seek help through patience and prayer.\' Emotionally supportive, comforting.",fam:"Well-known ayah, often quoted for consolation. Frequently cited alongside 2:45.",fit:"ٱلصَّلَوٰةِ is central — prayer as a means of seeking help. Similar to 2:45 but with \'O you who believe\' address."}},
  {ref:"29:45",root:"salah",rootAr:"صَلَاة",form:"صَلاة",formEn:"salah",role:"candidate",lesson:4,
   arabic:"ٱتْلُ مَآ أُوحِىَ إِلَيْكَ مِنَ ٱلْكِتَٰبِ وَأَقِمِ ٱلصَّلَوٰةَ ۖ إِنَّ ٱلصَّلَوٰةَ تَنْهَىٰ عَنِ ٱلْفَحْشَآءِ وَٱلْمُنكَرِ ۗ وَلَذِكْرُ ٱللَّهِ أَكْبَرُ ۗ وَٱللَّهُ يَعْلَمُ مَا تَصْنَعُونَ",
   trans:"Recite, [O Muhammad], what has been revealed to you of the Book and establish prayer. Indeed, prayer prohibits immorality and wrongdoing, and the remembrance of Allah is greater. And Allah knows that which you do.",
   t1:{len:7,frq:5,dom:1}, t2:{sto:3,fam:6,fit:10},
   notes:{len:"24 words",frq:"—",dom:"—",sto:"",fam:"",fit:""}},
  {ref:"8:3",root:"salah",rootAr:"صَلَاة",form:"صَلاة",formEn:"salah",role:"candidate",lesson:4,
   arabic:"ٱلَّذِينَ يُقِيمُونَ ٱلصَّلَوٰةَ وَمِمَّا رَزَقْنَٰهُمْ يُنفِقُونَ",
   trans:"The ones who establish prayer, and from what We have provided them, they spend.",
   t1:{len:4,frq:8,dom:8}, t2:{sto:2,fam:2,fit:7},
   notes:{len:"6 words",frq:"—",dom:"—",sto:"Description of true believers. No narrative, attribute list.",fam:"Al-Anfal — Tier D surah. Not commonly recited.",fit:"ٱلصَّلَوٰةَ is prominent — \'establish prayer and spend.\' Prayer is one of two main actions but shares focus with spending."}},
  {ref:"2:157",root:"salah",rootAr:"صَلَاة",form:"صَلاة",formEn:"salah",role:"candidate",lesson:4,
   arabic:"أُو۟لَٰٓئِكَ عَلَيْهِمْ صَلَوَٰتٌ مِّن رَّبِّهِمْ وَرَحْمَةٌ ۖ وَأُو۟لَٰٓئِكَ هُمُ ٱلْمُهْتَدُونَ",
   trans:"Those are the ones upon whom are blessings from their Lord and mercy. And it is those who are the [rightly] guided.",
   t1:{len:0,frq:8,dom:8}, t2:{sto:4,fam:5,fit:3},
   notes:{len:"10 words",frq:"—",dom:"—",sto:"Blessings and mercy upon the patient. Emotionally warm, comforting promise.",fam:"Part of the inna lillahi wa inna ilayhi raji\'un passage (2:155-157), which is very well-known.",fit:"صَلَوَٰتٌ here means \'blessings\' not \'prayers\' — different semantic usage that could confuse the prayer-meaning teaching."}},
  // ---- L5 falaha (فَلَحَ) ----
  {ref:"91:9",root:"falaha",rootAr:"فَلَحَ",form:"أَفْلَحَ",formEn:"falaha",role:"anchor",lesson:5,
   arabic:"قَدْ أَفْلَحَ مَن زَكَّىٰهَا",
   trans:"He has succeeded who purifies it,",
   t1:{len:6,frq:6,dom:7}, t2:{sto:5,fam:8,fit:9},
   notes:{len:"4 words",frq:"—",dom:"—",sto:"Part of the famous oath sequence in Ash-Shams — the soul\'s purification. Story hook from the oath structure.",fam:"Tier A — Ash-Shams is a commonly recited short surah in Juz 30.",fit:"Identical structure to 87:14. Root is central, short, crystal-clear meaning."}},
  {ref:"87:14",root:"falaha",rootAr:"فَلَحَ",form:"أَفْلَحَ",formEn:"falaha",role:"learning",lesson:5,
   arabic:"قَدْ أَفْلَحَ مَن تَزَكَّىٰ",
   trans:"He has certainly succeeded who purifies himself",
   t1:{len:6,frq:6,dom:7}, t2:{sto:4,fam:8,fit:9},
   notes:{len:"4 words",frq:"—",dom:"—",sto:"Declarative statement about purification leading to success. Some emotional weight but no narrative.",fam:"Tier A — Al-A\'la is among the last short surahs, recited frequently in salah.",fit:"Root is the very first word after qad. Short, self-contained, root meaning is the entire point."}},
  {ref:"23:1",root:"falaha",rootAr:"فَلَحَ",form:"أَفْلَحَ",formEn:"falaha",role:"learning",lesson:5,
   arabic:"بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ قَدْ أَفْلَحَ ٱلْمُؤْمِنُونَ",
   trans:"Certainly will the believers have succeeded:",
   t1:{len:3,frq:6,dom:7}, t2:{sto:6,fam:5,fit:8},
   notes:{len:"7 words",frq:"—",dom:"—",sto:"Opening declaration of Surah Al-Mu\'minun — \'the believers have succeeded\' is a powerful hook with iconic status.",fam:"Tier C — Al-Mu\'minun is well-known, opening ayah is famous. Not a daily recitation surah.",fit:"Root is central. Includes bismillah words which inflate count but the core phrase is \'qad aflaha al-mu\'minun\'."}},
  {ref:"18:20",root:"falaha",rootAr:"فَلَحَ",form:"أَفْلَحَ",formEn:"falaha",role:"learning",lesson:5,
   arabic:"إِنَّهُمْ إِن يَظْهَرُوا۟ عَلَيْكُمْ يَرْجُمُوكُمْ أَوْ يُعِيدُوكُمْ فِى مِلَّتِهِمْ وَلَن تُفْلِحُوٓا۟ إِذًا أَبَدًا",
   trans:"Indeed, if they come to know of you, they will stone you or return you to their religion. And never would you succeed, then - ever.\"",
   t1:{len:0,frq:6,dom:7}, t2:{sto:8,fam:6,fit:6},
   notes:{len:"13 words",frq:"—",dom:"—",sto:"Companions of the Cave discussing their peril — \'they will stone you or force you back; you will never succeed.\' Iconic story.",fam:"Tier B — Al-Kahf is recited weekly by many Muslims. This ayah is within the famous Cave narrative.",fit:"Root appears as \'lan tuflihu\' (you will never succeed). Strong negation, memorable in context."}},
  {ref:"20:64",root:"falaha",rootAr:"فَلَحَ",form:"أَفْلَحَ",formEn:"falaha",role:"learning",lesson:5,
   arabic:"فَأَجْمِعُوا۟ كَيْدَكُمْ ثُمَّ ٱئْتُوا۟ صَفًّا ۚ وَقَدْ أَفْلَحَ ٱلْيَوْمَ مَنِ ٱسْتَعْلَىٰ",
   trans:"So resolve upon your plan and then come [forward] in line. And he has succeeded today who overcomes.\"",
   t1:{len:0,frq:6,dom:7}, t2:{sto:7,fam:2,fit:8},
   notes:{len:"11 words",frq:"—",dom:"—",sto:"Pharaoh\'s magicians rallying before the showdown with Musa — \'he who overcomes today has succeeded.\' Dramatic tension.",fam:"Tier D — Surah Ta-Ha. The Musa narrative is known but this specific ayah is not widely memorized.",fit:"Root is central: \'qad aflaha al-yawma\' — success is the entire point of the declaration."}},
  {ref:"10:77",root:"falaha",rootAr:"فَلَحَ",form:"أَفْلَحَ",formEn:"falaha",role:"learning",lesson:5,
   arabic:"قَالَ مُوسَىٰٓ أَتَقُولُونَ لِلْحَقِّ لَمَّا جَآءَكُمْ ۖ أَسِحْرٌ هَٰذَا وَلَا يُفْلِحُ ٱلسَّٰحِرُونَ",
   trans:"Moses said, \"Do you say [thus] about the truth when it has come to you? Is this magic? But magicians will not succeed.\"",
   t1:{len:0,frq:6,dom:7}, t2:{sto:7,fam:2,fit:7},
   notes:{len:"12 words",frq:"—",dom:"—",sto:"Musa confronting Pharaoh\'s magicians — \'Is this magic? Magicians will not succeed.\' Iconic prophetic showdown.",fam:"Tier D — Surah Yunus, not commonly recited.",fit:"Root is central to Musa\'s argument: magicians will NOT succeed. Clear, memorable teaching moment."}},
  {ref:"22:77",root:"falaha",rootAr:"فَلَحَ",form:"أَفْلَحَ",formEn:"falaha",role:"learning",lesson:5,
   arabic:"يَٰٓأَيُّهَا ٱلَّذِينَ ءَامَنُوا۟ ٱرْكَعُوا۟ وَٱسْجُدُوا۟ وَٱعْبُدُوا۟ رَبَّكُمْ وَٱفْعَلُوا۟ ٱلْخَيْرَ لَعَلَّكُمْ تُفْلِحُونَ ۩",
   trans:"O you who have believed, bow and prostrate and worship your Lord and do good - that you may succeed.",
   t1:{len:0,frq:6,dom:7}, t2:{sto:5,fam:2,fit:7},
   notes:{len:"12 words",frq:"—",dom:"—",sto:"Direct command to bow, prostrate, worship, do good. Emotional weight from its worship connection.",fam:"Tier D — Al-Hajj. Contains a sajdah marker, known to some. Not widely memorized.",fit:"Root is the climax: do all this \'that you may succeed.\' Worship + success is a natural pairing."}},
  {ref:"3:200",root:"falaha",rootAr:"فَلَحَ",form:"أَفْلَحَ",formEn:"falaha",role:"learning",lesson:5,
   arabic:"يَٰٓأَيُّهَا ٱلَّذِينَ ءَامَنُوا۟ ٱصْبِرُوا۟ وَصَابِرُوا۟ وَرَابِطُوا۟ وَٱتَّقُوا۟ ٱللَّهَ لَعَلَّكُمْ تُفْلِحُونَ",
   trans:"O you who have believed, persevere and endure and remain stationed and fear Allah that you may be successful.",
   t1:{len:0,frq:6,dom:7}, t2:{sto:5,fam:3,fit:5},
   notes:{len:"10 words",frq:"—",dom:"—",sto:"Stirring call to patience and steadfastness. Emotional resonance from the triple command.",fam:"Tier D — last ayah of Aal-e-Imran. Known to some but not widely memorized.",fit:"Root is the concluding word (tuflihun). Verse is about patience, not success per se."}},
  {ref:"8:45",root:"falaha",rootAr:"فَلَحَ",form:"أَفْلَحَ",formEn:"falaha",role:"learning",lesson:5,
   arabic:"يَٰٓأَيُّهَا ٱلَّذِينَ ءَامَنُوٓا۟ إِذَا لَقِيتُمْ فِئَةً فَٱثْبُتُوا۟ وَٱذْكُرُوا۟ ٱللَّهَ كَثِيرًا لَّعَلَّكُمْ تُفْلِحُونَ",
   trans:"O you who have believed, when you encounter a company [from the enemy forces], stand firm and remember Allah much that you may be successful.",
   t1:{len:0,frq:6,dom:7}, t2:{sto:6,fam:2,fit:5},
   notes:{len:"12 words",frq:"—",dom:"—",sto:"Battle context — stand firm when meeting the enemy, remember Allah. Vivid, emotionally charged.",fam:"Tier D — Al-Anfal, not commonly recited outside study.",fit:"Root is the concluding promise (tuflihun). Battle context gives success real stakes."}},
  {ref:"3:130",root:"falaha",rootAr:"فَلَحَ",form:"أَفْلَحَ",formEn:"falaha",role:"learning",lesson:5,
   arabic:"يَٰٓأَيُّهَا ٱلَّذِينَ ءَامَنُوا۟ لَا تَأْكُلُوا۟ ٱلرِّبَوٰٓا۟ أَضْعَٰفًا مُّضَٰعَفَةً ۖ وَٱتَّقُوا۟ ٱللَّهَ لَعَلَّكُمْ تُفْلِحُونَ",
   trans:"O you who have believed, do not consume usury, doubled and multiplied, but fear Allah that you may be successful.",
   t1:{len:0,frq:6,dom:7}, t2:{sto:4,fam:2,fit:5},
   notes:{len:"13 words",frq:"—",dom:"—",sto:"Direct prohibition of usury with promise of success. Some weight from the commanding tone.",fam:"Tier D — Aal-e-Imran, not a commonly recited individual ayah.",fit:"Root is the concluding promise (tuflihun) but the verse is primarily about riba (usury)."}},
  {ref:"10:69",root:"falaha",rootAr:"فَلَحَ",form:"أَفْلَحَ",formEn:"falaha",role:"candidate",lesson:5,
   arabic:"قُلْ إِنَّ ٱلَّذِينَ يَفْتَرُونَ عَلَى ٱللَّهِ ٱلْكَذِبَ لَا يُفْلِحُونَ",
   trans:"Say, \"Indeed, those who invent falsehood about Allah will not succeed.\"",
   t1:{len:1,frq:6,dom:7}, t2:{sto:3,fam:1,fit:6},
   notes:{len:"9 words",frq:"—",dom:"—",sto:"Warning about those who invent lies about Allah. Generic admonition, no specific narrative.",fam:"Tier D — Surah Yunus, not commonly recited.",fit:"Root appears clearly in la yuflihun (they will not succeed). Negative form but still teaches the root."}},
  {ref:"5:35",root:"falaha",rootAr:"فَلَحَ",form:"أَفْلَحَ",formEn:"falaha",role:"candidate",lesson:5,
   arabic:"يَٰٓأَيُّهَا ٱلَّذِينَ ءَامَنُوا۟ ٱتَّقُوا۟ ٱللَّهَ وَٱبْتَغُوٓا۟ إِلَيْهِ ٱلْوَسِيلَةَ وَجَٰهِدُوا۟ فِى سَبِيلِهِۦ لَعَلَّكُمْ تُفْلِحُونَ",
   trans:"O you who have believed, fear Allah and seek the means [of nearness] to Him and strive in His cause that you may succeed.",
   t1:{len:0,frq:6,dom:7}, t2:{sto:3,fam:1,fit:5},
   notes:{len:"13 words",frq:"—",dom:"—",sto:"General exhortation to fear Allah, seek nearness, strive. No specific narrative.",fam:"Tier D — Al-Ma\'idah, not a commonly recited individual ayah.",fit:"Root appears as tuflihun at the end. Verse is about taqwa/jihad, success is the promised outcome."}},
  {ref:"12:23",root:"falaha",rootAr:"فَلَحَ",form:"أَفْلَحَ",formEn:"falaha",role:"candidate",lesson:5,
   arabic:"وَرَٰوَدَتْهُ ٱلَّتِى هُوَ فِى بَيْتِهَا عَن نَّفْسِهِۦ وَغَلَّقَتِ ٱلْأَبْوَٰبَ وَقَالَتْ هَيْتَ لَكَ ۚ قَالَ مَعَاذَ ٱللَّهِ ۖ إِنَّهُۥ رَبِّىٓ أَحْسَنَ مَثْوَاىَ ۖ إِنَّهُۥ لَا يُفْلِحُ ٱلظَّٰلِمُونَ",
   trans:"And she, in whose house he was, sought to seduce him. She closed the doors and said, \"Come, you.\" He said, \"[I seek] the refuge of Allah. Indeed, he is my master, who has made good my residence. Indeed, wrongdoers will not succeed.\"",
   t1:{len:0,frq:6,dom:7}, t2:{sto:9,fam:3,fit:5},
   notes:{len:"26 words",frq:"—",dom:"—",sto:"Yusuf and the wife of al-Aziz — she locks doors, he refuses. \'Wrongdoers will not succeed.\' Iconic story every Muslim knows.",fam:"Tier C — Surah Yusuf is well-known and loved, though not a daily recitation surah.",fit:"Root appears in Yusuf\'s concluding declaration. Powerful context but 26 words and root is at the end."}},
  {ref:"20:69",root:"falaha",rootAr:"فَلَحَ",form:"أَفْلَحَ",formEn:"falaha",role:"candidate",lesson:5,
   arabic:"وَأَلْقِ مَا فِى يَمِينِكَ تَلْقَفْ مَا صَنَعُوٓا۟ ۖ إِنَّمَا صَنَعُوا۟ كَيْدُ سَٰحِرٍ ۖ وَلَا يُفْلِحُ ٱلسَّاحِرُ حَيْثُ أَتَىٰ",
   trans:"And throw what is in your right hand; it will swallow up what they have crafted. What they have crafted is but the trick of a magician, and the magician will not succeed wherever he is.\"",
   t1:{len:0,frq:6,dom:7}, t2:{sto:8,fam:2,fit:7},
   notes:{len:"18 words",frq:"—",dom:"—",sto:"Allah tells Musa to throw his staff — it will swallow the magicians\' tricks. \'The magician will not succeed wherever he goes.\' Climactic moment.",fam:"Tier D — Surah Ta-Ha. Famous narrative but not a commonly memorized individual ayah.",fit:"Root appears in \'la yuflihu al-sahir.\' Central to the lesson: real power vs. magic. 18 words."}},
  {ref:"28:37",root:"falaha",rootAr:"فَلَحَ",form:"أَفْلَحَ",formEn:"falaha",role:"candidate",lesson:5,
   arabic:"وَقَالَ مُوسَىٰ رَبِّىٓ أَعْلَمُ بِمَن جَآءَ بِٱلْهُدَىٰ مِنْ عِندِهِۦ وَمَن تَكُونُ لَهُۥ عَٰقِبَةُ ٱلدَّارِ ۖ إِنَّهُۥ لَا يُفْلِحُ ٱلظَّٰلِمُونَ",
   trans:"And Moses said, \"My Lord is more knowing [than we or you] of who has come with guidance from Him and to whom will be succession in the home. Indeed, wrongdoers do not succeed.\"",
   t1:{len:0,frq:6,dom:7}, t2:{sto:7,fam:1,fit:5},
   notes:{len:"19 words",frq:"—",dom:"—",sto:"Musa declaring to Pharaoh: \'My Lord knows best who brings guidance. Wrongdoers will not succeed.\' Prophetic confrontation.",fam:"Tier D — Al-Qasas, not commonly recited.",fit:"Root in concluding \'la yuflihu al-zalimun.\' 19 words, root supports Musa\'s argument but is not central."}},
  // ---- L6 khayr (خَيْر) ----

  {ref:"93:4",root:"khayr",rootAr:"خَيْر",form:"خَيْر",formEn:"khayr",role:"learning",lesson:6,

  {ref:"99:7",root:"khayr",rootAr:"خَيْر",form:"خَيْر",formEn:"khayr",role:"learning",lesson:6,
   arabic:"فَمَن يَعْمَلْ مِثْقَالَ ذَرَّةٍ خَيْرًا يَرَهُۥ",

   notes:{len:"6 words",frq:"—",dom:"—",sto:"Day of Judgment accountability — powerful concept of atoms-weight deeds. Widely quoted in moral teaching.",fam:"Az-Zalzalah — Tier A, short Juz\' 30 surah. This ayah pair (99:7-8) is among the most quoted in all of Islam.",fit:"khayr used as noun \'good\' — clear meaning. Slight drawback: it\'s one half of a pair (99:7-8), but stands alone well enough."}},
  {ref:"87:17",root:"khayr",rootAr:"خَيْر",form:"خَيْر",formEn:"khayr",role:"learning",lesson:6,

  {ref:"18:81",root:"khayr",rootAr:"خَيْر",form:"خَيْر",formEn:"khayr",role:"learning",lesson:6,
   arabic:"فَأَرَدْنَآ أَن يُبْدِلَهُمَا رَبُّهُمَا خَيْرًا مِّنْهُ زَكَوٰةً وَأَقْرَبَ رُحْمًا",
   trans:"So we intended that their Lord should substitute for them one better than him in purity and nearer to mercy.",
   t1:{len:1,frq:9,dom:9}, t2:{sto:9,fam:6,fit:7},

  {ref:"3:54",root:"khayr",rootAr:"خَيْر",form:"خَيْر",formEn:"khayr",role:"learning",lesson:6,
   arabic:"وَمَكَرُوا۟ وَمَكَرَ ٱللَّهُ ۖ وَٱللَّهُ خَيْرُ ٱلْمَٰكِرِينَ",

  {ref:"12:39",root:"khayr",rootAr:"خَيْر",form:"خَيْر",formEn:"khayr",role:"learning",lesson:6,
   arabic:"يَٰصَٰحِبَىِ ٱلسِّجْنِ ءَأَرْبَابٌ مُّتَفَرِّقُونَ خَيْرٌ أَمِ ٱللَّهُ ٱلْوَٰحِدُ ٱلْقَهَّارُ",
   trans:"O [my] two companions of prison, are separate lords better or Allah, the One, the Prevailing?",

   arabic:"إِنَّ ٱلَّذِينَ ءَامَنُوا۟ وَعَمِلُوا۟ ٱلصَّٰلِحَٰتِ أُو۟لَٰٓئِكَ هُمْ خَيْرُ ٱلْبَرِيَّةِ",

  {ref:"100:8",root:"khayr",rootAr:"خَيْر",form:"خَيْر",formEn:"khayr",role:"learning",lesson:6,

  {ref:"37:62",root:"khayr",rootAr:"خَيْر",form:"خَيْر",formEn:"khayr",role:"candidate",lesson:6,

  {ref:"68:12",root:"khayr",rootAr:"خَيْر",form:"خَيْر",formEn:"khayr",role:"candidate",lesson:6,

// State
const adj = {};
DATA.forEach(v => adj[v.ref] = 0);
let currentRoot = 'all';

// Helpers
function t1(v) { return v.t1.len + v.t1.frq + v.t1.dom; }
function t2(v) { return v.t2.sto + v.t2.fam + v.t2.fit; }
function tot(v) { return t1(v) + t2(v) + (adj[v.ref]||0); }
function cls(total) { return total>=55?'excellent':total>=35?'good':total>=18?'acceptable':'weak'; }
function clsColor(c) { return c==='excellent'?'#16a34a':c==='good'?'#2563eb':c==='acceptable'?'#ca8a04':'#dc2626'; }
function cellColor(s) { if(s>=8) return '#16a34a'; if(s>=6) return '#22c55e'; if(s>=4) return '#ca8a04'; if(s>=2) return '#f97316'; return '#dc2626'; }

function getVal(v, col) {
  if (col==='total') return tot(v);
  if (col==='t1') return t1(v);
  if (col==='t2') return t2(v);
  if (col==='ref') return v.ref;
  if (col==='lesson') return v.lesson;
  if (col==='root') return v.root;
  if (col==='role') return v.role;
  if (['len','frq','dom'].includes(col)) return v.t1[col];
  if (['sto','fam','fit'].includes(col)) return v.t2[col];
  return 0;
}

function hideTip() { tip.style.display='none'; }

function render() {
  let filtered = currentRoot==='all' ? DATA : DATA.filter(v=>v.root===currentRoot);
  // Apply view filter
  if (currentView==='selected') filtered = filtered.filter(v=>SELECTED_ROLES.includes(v.role));
  else if (currentView==='candidate') filtered = filtered.filter(v=>v.role==='candidate');
  const useGroups = sortCol==='total' && sortDir==='desc' && currentRoot==='all';

  let sorted;
  if (useGroups) {
    // Group by root, sort within group
    const groups = {};
    filtered.forEach(v => { const k=`L${v.lesson} — ${v.rootAr} (${v.root})`; (groups[k]=groups[k]||[]).push(v); });
    sorted = null; // use groups
    renderGrouped(groups);
  } else {
    sorted = [...filtered].sort((a,b) => {
      let av = getVal(a, sortCol), bv = getVal(b, sortCol);
      if (typeof av === 'string') return sortDir==='asc' ? av.localeCompare(bv) : bv.localeCompare(av);
      return sortDir==='asc' ? av-bv : bv-av;
    });
    renderFlat(sorted);
  }
}

const COLS = [
  {key:'lesson',label:'L',num:true},
  {key:'root',label:'Root',num:false},
  {key:'ref',label:'Ref',num:false},
  {key:'form',label:'Form',num:false},
  {key:'role',label:'Role',num:false},
  {key:'arabic',label:'Arabic',num:false},
  {key:'trans',label:'Translation',num:false},
  {key:'len',label:'Len',num:true},
  {key:'frq',label:'Frq',num:true},
  {key:'dom',label:'Dom',num:true},
  {key:'sto',label:'Sto',num:true},
  {key:'fam',label:'Fam',num:true},
  {key:'fit',label:'Fit',num:true},
  {key:'adj',label:'Adj',num:true},
  {key:'total',label:'Total',num:true},
];

function headerRow() {
  return '<tr>' + COLS.map(c => {
    const cls = c.num ? ' class="num"' : (c.key==='trans'?' class="trans"':'');
    const sortCls = sortCol===c.key ? (sortDir==='asc'?' sorted-asc':' sorted-desc') : '';
    const sortable = !['arabic','form'].includes(c.key);
    const onclick = sortable ? ` onclick="doSort('${c.key}')"` : '';
    return `<th${cls}${onclick} class="${c.num?'num':c.key==='trans'?'trans':''}${sortCls}">${c.label}</th>`;
  }).join('') + '</tr>';
}

function verseRow(v) {
  const total = tot(v); const c = cls(total);
  const rid = v.ref.replace(/[:\/]/g,'-');
  const rowCls = v.role==='candidate' ? 'data-row candidate-row' : 'data-row';
  let html = `<tr class="${rowCls}" onclick="toggleDetail('${rid}')">`;
  html += `<td class="num">${v.lesson}</td>`;
  html += `<td class="arabic" style="font-size:0.85rem">${v.rootAr}</td>`;
  html += `<td><strong>${v.ref}</strong></td>`;
  html += `<td class="arabic">${v.form}</td>`;
  html += `<td><span class="badge badge-${v.role}">${v.role}</span></td>`;
  html += `<td class="arabic" style="font-size:0.9rem">${v.arabic}</td>`;
  html += `<td class="trans">${v.trans}</td>`;
  ['len','frq','dom'].forEach(d => {
    const s = v.t1[d]; const note = v.notes[d];
    html += `<td class="num"><span class="cell" style="background:${cellColor(s)}" onmouseenter="showTip(event,'${note}')" onmouseleave="hideTip()">${s}</span></td>`;
  });
  ['sto','fam','fit'].forEach(d => {
    const s = v.t2[d]; const note = v.notes[d].replace(/'/g,"\u2019");
    html += `<td class="num"><span class="cell" style="background:${cellColor(s)}" onmouseenter="showTip(event,'${note}')" onmouseleave="hideTip()">${s}</span></td>`;
  });
  html += `<td class="num" onclick="event.stopPropagation()"><input class="adj-input" type="number" min="-5" max="5" value="${adj[v.ref]}" onchange="adjChange('${v.ref}',this.value)"></td>`;
  html += `<td class="num tot" style="color:${clsColor(c)}">${total}</td>`;
  html += `</tr>`;
  // Detail row
  html += `<tr class="detail-row" id="detail-${rid}"><td colspan="15"><div class="detail-grid">`;
  [{k:'len',l:'Length',s:v.t1.len,n:v.notes.len,t:'t1'},
   {k:'frq',l:'Form Freq',s:v.t1.frq,n:v.notes.frq,t:'t1'},
   {k:'dom',l:'Form Dom',s:v.t1.dom,n:v.notes.dom,t:'t1'},
   {k:'sto',l:'Story/Emotion',s:v.t2.sto,n:v.notes.sto,t:'t2'},
   {k:'fam',l:'Familiarity',s:v.t2.fam,n:v.notes.fam,t:'t2'},
   {k:'fit',l:'Teaching Fit',s:v.t2.fit,n:v.notes.fit,t:'t2'},
  ].forEach(d => {
    html += `<div><div class="detail-dim-header"><span>${d.l}</span><span>${d.s}/10</span></div>`;
    html += `<div class="detail-bar-bg"><div class="detail-bar ${d.t}" style="width:${d.s*10}%"></div></div>`;
    html += `<div class="detail-reason">${d.n}</div></div>`;
  });
  html += `</div></td></tr>`;
  return html;
}

function renderGrouped(groups) {
  let html = `<table><thead>${headerRow()}</thead><tbody>`;
  for (const [group, verses] of Object.entries(groups)) {
    html += `<tr class="group-header"><td colspan="15">${group}</td></tr>`;
    verses.sort((a,b) => tot(b)-tot(a));
    verses.forEach(v => html += verseRow(v));
  }
  html += '</tbody></table>';
  document.getElementById('table-container').innerHTML = html;
}

function renderFlat(sorted) {
  let html = `<table><thead>${headerRow()}</thead><tbody>`;
  sorted.forEach(v => html += verseRow(v));
  html += '</tbody></table>';
  document.getElementById('table-container').innerHTML = html;
}

function toggleDetail(rid) {
  const row = document.getElementById('detail-' + rid);
  if (row) row.classList.toggle('open');
}

function adjChange(ref, val) {
  adj[ref] = Math.max(-5, Math.min(5, parseInt(val)||0));
  render();
}

function doSort(col) {
  if (sortCol === col) { sortDir = sortDir==='desc'?'asc':'desc'; }
  else { sortCol = col; sortDir = 'desc'; }
  render();
}

function filterRoot(root) {
  currentRoot = root;
  document.querySelectorAll('[data-root]').forEach(b => b.classList.toggle('active', b.dataset.root===root));
  render();
}

function filterView(view) {
  currentView = view;
  document.querySelectorAll('[data-view]').forEach(b => b.classList.toggle('active', b.dataset.view===view));
  render();
}

render();
</script>
</body>
</html>
