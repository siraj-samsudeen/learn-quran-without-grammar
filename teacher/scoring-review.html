   notes:{len:"v1",frq:"—",dom:"—",sto:"Ultra-short \u2014 two forms (active + passive participle). Juz\u2019 30.",fam:"v1",fit:"v1"}},
  {ref:"2:143",root:"shahida",rootAr:"شَهِدَ",form:"شُهَدَاء+شَهِيد",formEn:"shuhada+shahid",role:"candidate",lesson:2,
   arabic:"لِّتَكُونُوا۟ شُهَدَآءَ عَلَى ٱلنَّاسِ وَيَكُونَ ٱلرَّسُولُ عَلَيْكُمْ شَهِيدًا",
   trans:"So you may be witnesses over mankind, and the Messenger a witness over you",
   t1:{len:1,frq:0,dom:0}, t2:{sto:4,fam:0,fit:3},
   notes:{len:"v1",frq:"—",dom:"—",sto:"This ummah\u2019s mission. Good future Practice.",fam:"v1",fit:"v1"}},
  {ref:"16:89",root:"shahida",rootAr:"شَهِدَ",form:"شَهِيد",formEn:"shahid",role:"candidate",lesson:2,
   arabic:"وَجِئْنَا بِكَ شَهِيدًا عَلَىٰ هَٰٓؤُلَآءِ",
   trans:"And We brought you as a witness over these",
   t1:{len:2,frq:0,dom:0}, t2:{sto:4,fam:0,fit:3},
   notes:{len:"v1",frq:"—",dom:"—",sto:"Prophet as witness over his ummah.",fam:"v1",fit:"v1"}},
  {ref:"41:53",root:"shahida",rootAr:"شَهِدَ",form:"شَهِيد",formEn:"shahid",role:"candidate",lesson:2,
   arabic:"أَوَلَمْ يَكْفِ بِرَبِّكَ أَنَّهُۥ عَلَىٰ كُلِّ شَىْءٍ شَهِيدٌ",
   trans:"Is it not enough that your Lord is Witness over everything?",
   t1:{len:1,frq:0,dom:0}, t2:{sto:2,fam:0,fit:0},
   notes:{len:"v1",frq:"—",dom:"—",sto:"Powerful rhetorical \u2014 signs in horizons and in yourselves.",fam:"v1",fit:"v1"}},
];

// State
const adj = {};
DATA.forEach(v => adj[v.ref] = 0);
let currentRoot = 'all';
let currentView = 'selected';
let sortCol = 'total';
let sortDir = 'desc';
const SELECTED_ROLES = ['anchor','learn','practice'];

// Helpers
function t1(v) { return v.t1.len + v.t1.frq + v.t1.dom; }
function t2(v) { return v.t2.sto + v.t2.fam + v.t2.fit; }
function tot(v) { return t1(v) + t2(v) + (adj[v.ref]||0); }
function cls(total) { return total>=55?'excellent':total>=35?'good':total>=18?'acceptable':'weak'; }
function clsColor(c) { return c==='excellent'?'#16a34a':c==='good'?'#2563eb':c==='acceptable'?'#ca8a04':'#dc2626'; }
function cellColor(s) { if(s>=8) return '#16a34a'; if(s>=6) return '#22c55e'; if(s>=4) return '#ca8a04'; if(s>=2) return '#f97316'; return '#dc2626'; }

function getVal(v, col) {
  if (col==='total') return tot(v);
  if (col==='t1') return t1(v);
  if (col==='t2') return t2(v);
  if (col==='ref') return v.ref;
  if (col==='lesson') return v.lesson;
  if (col==='root') return v.root;
  if (col==='role') return v.role;
  if (['len','frq','dom'].includes(col)) return v.t1[col];
  if (['sto','fam','fit'].includes(col)) return v.t2[col];
  return 0;
}

// Tooltip
const tip = document.getElementById('tip');
function showTip(e,text) { tip.style.display='block'; tip.textContent=text; tip.style.left=(e.pageX+12)+'px'; tip.style.top=(e.pageY-30)+'px'; }
function hideTip() { tip.style.display='none'; }

function render() {
  let filtered = currentRoot==='all' ? DATA : DATA.filter(v=>v.root===currentRoot);
  // Apply view filter
  if (currentView==='selected') filtered = filtered.filter(v=>SELECTED_ROLES.includes(v.role));
  else if (currentView==='candidate') filtered = filtered.filter(v=>v.role==='candidate');
  const useGroups = sortCol==='total' && sortDir==='desc' && currentRoot==='all';

  let sorted;
  if (useGroups) {
    // Group by root, sort within group
    const groups = {};
    filtered.forEach(v => { const k=`L${v.lesson} — ${v.rootAr} (${v.root})`; (groups[k]=groups[k]||[]).push(v); });
    sorted = null; // use groups
    renderGrouped(groups);
  } else {
    sorted = [...filtered].sort((a,b) => {
      let av = getVal(a, sortCol), bv = getVal(b, sortCol);
      if (typeof av === 'string') return sortDir==='asc' ? av.localeCompare(bv) : bv.localeCompare(av);
      return sortDir==='asc' ? av-bv : bv-av;
    });
    renderFlat(sorted);
  }
}

const COLS = [
  {key:'lesson',label:'L',num:true},
  {key:'root',label:'Root',num:false},
  {key:'ref',label:'Ref',num:false},
  {key:'form',label:'Form',num:false},
  {key:'role',label:'Role',num:false},
  {key:'arabic',label:'Arabic',num:false},
  {key:'trans',label:'Translation',num:false},
  {key:'len',label:'Len',num:true},
  {key:'frq',label:'Frq',num:true},
  {key:'dom',label:'Dom',num:true},
  {key:'sto',label:'Sto',num:true},
  {key:'fam',label:'Fam',num:true},
  {key:'fit',label:'Fit',num:true},
  {key:'adj',label:'Adj',num:true},
  {key:'total',label:'Total',num:true},
];

function headerRow() {
  return '<tr>' + COLS.map(c => {
    const cls = c.num ? ' class="num"' : (c.key==='trans'?' class="trans"':'');
    const sortCls = sortCol===c.key ? (sortDir==='asc'?' sorted-asc':' sorted-desc') : '';
    const sortable = !['arabic','form'].includes(c.key);
    const onclick = sortable ? ` onclick="doSort('${c.key}')"` : '';
    return `<th${cls}${onclick} class="${c.num?'num':c.key==='trans'?'trans':''}${sortCls}">${c.label}</th>`;
  }).join('') + '</tr>';
}

function verseRow(v) {
  const total = tot(v); const c = cls(total);
  const rid = v.ref.replace(/[:\/]/g,'-');
  const rowCls = v.role==='candidate' ? 'data-row candidate-row' : 'data-row';
  let html = `<tr class="${rowCls}" onclick="toggleDetail('${rid}')">`;
  html += `<td class="num">${v.lesson}</td>`;
  html += `<td class="arabic" style="font-size:0.85rem">${v.rootAr}</td>`;
  html += `<td><strong>${v.ref}</strong></td>`;
  html += `<td class="arabic">${v.form}</td>`;
  html += `<td><span class="badge badge-${v.role}">${v.role}</span></td>`;
  html += `<td class="arabic" style="font-size:0.9rem">${v.arabic}</td>`;
  html += `<td class="trans">${v.trans}</td>`;
  ['len','frq','dom'].forEach(d => {
    const s = v.t1[d]; const note = v.notes[d];
    html += `<td class="num"><span class="cell" style="background:${cellColor(s)}" onmouseenter="showTip(event,'${note}')" onmouseleave="hideTip()">${s}</span></td>`;
  });
  ['sto','fam','fit'].forEach(d => {
    const s = v.t2[d]; const note = v.notes[d].replace(/'/g,"\u2019");
    html += `<td class="num"><span class="cell" style="background:${cellColor(s)}" onmouseenter="showTip(event,'${note}')" onmouseleave="hideTip()">${s}</span></td>`;
  });
  html += `<td class="num" onclick="event.stopPropagation()"><input class="adj-input" type="number" min="-5" max="5" value="${adj[v.ref]}" onchange="adjChange('${v.ref}',this.value)"></td>`;
  html += `<td class="num tot" style="color:${clsColor(c)}">${total}</td>`;
  html += `</tr>`;
  // Detail row
  html += `<tr class="detail-row" id="detail-${rid}"><td colspan="15"><div class="detail-grid">`;
  [{k:'len',l:'Length',s:v.t1.len,n:v.notes.len,t:'t1'},
   {k:'frq',l:'Form Freq',s:v.t1.frq,n:v.notes.frq,t:'t1'},
   {k:'dom',l:'Form Dom',s:v.t1.dom,n:v.notes.dom,t:'t1'},
   {k:'sto',l:'Story/Emotion',s:v.t2.sto,n:v.notes.sto,t:'t2'},
   {k:'fam',l:'Familiarity',s:v.t2.fam,n:v.notes.fam,t:'t2'},
   {k:'fit',l:'Teaching Fit',s:v.t2.fit,n:v.notes.fit,t:'t2'},
  ].forEach(d => {
    html += `<div><div class="detail-dim-header"><span>${d.l}</span><span>${d.s}/10</span></div>`;
    html += `<div class="detail-bar-bg"><div class="detail-bar ${d.t}" style="width:${d.s*10}%"></div></div>`;
    html += `<div class="detail-reason">${d.n}</div></div>`;
  });
  html += `</div></td></tr>`;
  return html;
}

function renderGrouped(groups) {
  let html = `<table><thead>${headerRow()}</thead><tbody>`;
  for (const [group, verses] of Object.entries(groups)) {
    html += `<tr class="group-header"><td colspan="15">${group}</td></tr>`;
    verses.sort((a,b) => tot(b)-tot(a));
    verses.forEach(v => html += verseRow(v));
  }
  html += '</tbody></table>';
  document.getElementById('table-container').innerHTML = html;
}

function renderFlat(sorted) {
  let html = `<table><thead>${headerRow()}</thead><tbody>`;
  sorted.forEach(v => html += verseRow(v));
  html += '</tbody></table>';
  document.getElementById('table-container').innerHTML = html;
}

function toggleDetail(rid) {
  const row = document.getElementById('detail-' + rid);
  if (row) row.classList.toggle('open');
}

function adjChange(ref, val) {
  adj[ref] = Math.max(-5, Math.min(5, parseInt(val)||0));
  render();
}

function doSort(col) {
  if (sortCol === col) { sortDir = sortDir==='desc'?'asc':'desc'; }
  else { sortCol = col; sortDir = 'desc'; }
  render();
}

function filterRoot(root) {
  currentRoot = root;
  document.querySelectorAll('[data-root]').forEach(b => b.classList.toggle('active', b.dataset.root===root));
  render();
}

function filterView(view) {
  currentView = view;
  document.querySelectorAll('[data-view]').forEach(b => b.classList.toggle('active', b.dataset.view===view));
  render();
}

render();
</script>
</body>
</html>
