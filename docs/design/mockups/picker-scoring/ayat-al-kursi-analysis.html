<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<title>Ayat al-Kursi (2:255) — Lemma Frequency Analysis</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; padding: 24px; color: #1a1a1a; }
  h1 { font-size: 1.4rem; margin-bottom: 4px; }
  .subtitle { color: #666; margin-bottom: 24px; font-size: 0.9rem; }
  .verse-arabic { direction: rtl; text-align: right; font-family: 'Amiri', 'Scheherazade New', serif; font-size: 1.6rem; line-height: 2.2; background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 24px; border: 1px solid #e0e0e0; }
  .word-chip { display: inline-block; padding: 4px 8px; margin: 2px; border-radius: 6px; cursor: default; position: relative; }
  .word-chip:hover .tooltip { display: block; }
  .tooltip { display: none; position: absolute; bottom: 100%; right: 50%; transform: translateX(50%); background: #333; color: #fff; padding: 6px 10px; border-radius: 6px; font-size: 0.75rem; white-space: nowrap; z-index: 10; direction: ltr; text-align: left; font-family: -apple-system, sans-serif; }
  .tooltip::after { content: ''; position: absolute; top: 100%; right: 50%; transform: translateX(50%); border: 5px solid transparent; border-top-color: #333; }
  .freq-high { background: #dcfce7; border: 1px solid #86efac; }
  .freq-mid { background: #fef9c3; border: 1px solid #fde047; }
  .freq-low { background: #fee2e2; border: 1px solid #fca5a5; }
  .freq-func { background: #f3f4f6; border: 1px solid #d1d5db; opacity: 0.6; }
  .legend { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; }
  .legend-swatch { width: 16px; height: 16px; border-radius: 4px; }
  .section { background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #e0e0e0; }
  .section h2 { font-size: 1.1rem; margin-bottom: 12px; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th { text-align: left; padding: 8px 12px; border-bottom: 2px solid #e0e0e0; font-weight: 600; }
  td { padding: 8px 12px; border-bottom: 1px solid #f0f0f0; }
  .arabic-cell { direction: rtl; font-family: 'Amiri', serif; font-size: 1.1rem; }
  .freq-bar { height: 8px; border-radius: 4px; background: #3b82f6; display: inline-block; vertical-align: middle; }
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: #f8fafc; padding: 16px; border-radius: 8px; text-align: center; }
  .stat-value { font-size: 1.8rem; font-weight: 700; color: #2563eb; }
  .stat-label { font-size: 0.8rem; color: #666; margin-top: 4px; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">
</head>
<body>

<h1>Ayat al-Kursi (2:255) — Lemma Frequency Analysis</h1>
<p class="subtitle">Each word colored by how frequently its lemma appears across the entire Qur'an</p>

<div class="legend">
  <div class="legend-item"><div class="legend-swatch" style="background:#dcfce7;border:1px solid #86efac"></div> High freq (100+)</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#fef9c3;border:1px solid #fde047"></div> Mid freq (10–99)</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#fee2e2;border:1px solid #fca5a5"></div> Rare (&lt;10)</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#f3f4f6;border:1px solid #d1d5db"></div> Function word</div>
</div>

<div id="verse-display" class="verse-arabic">Loading...</div>

<div class="stat-grid" id="stats">Loading...</div>

<div class="section">
  <h2>Content Words — by Frequency</h2>
  <table id="content-table">
    <thead><tr><th>Arabic</th><th>Lemma</th><th>English</th><th style="text-align:right">Qur'an Freq</th><th style="width:200px">Distribution</th></tr></thead>
    <tbody></tbody>
  </table>
</div>

<script>
const WORDS = [
  // word, lemma, english, freq, isFunction
  ["ٱللَّهُ", "اللَّه", "Allah", 2699, false],
  ["لَآ", "لا", "no", 1742, true],
  ["إِلَٰهَ", "إِلٰه", "god", 147, false],
  ["إِلَّا", "إِلّا", "except", 659, true],
  ["هُوَ", "هُوَ", "He", 0, true],
  ["ٱلْحَىُّ", "حَيّ", "the Ever-Living", 24, false],
  ["ٱلْقَيُّومُ", "قَيُّوم", "the Sustainer", 3, false],
  ["لَا", "لا", "not", 1742, true],
  ["تَأْخُذُهُۥ", "أَخَذَ", "overtakes Him", 127, false],
  ["سِنَةٌ", "سِنَة", "drowsiness", 1, false],
  ["وَلَا", "لا", "and not", 1742, true],
  ["نَوْمٌ", "نَوْم", "sleep", 3, false],
  ["لَّهُۥ", "ل", "to Him", 4380, true],
  ["مَا", "ما", "what", 2565, true],
  ["فِى", "فِي", "in", 1701, true],
  ["ٱلسَّمَٰوَٰتِ", "سَماء", "the heavens", 310, false],
  ["وَمَا", "ما", "and what", 2565, true],
  ["فِى", "فِي", "in", 1701, true],
  ["ٱلْأَرْضِ", "أَرْض", "the earth", 461, false],
  ["مَن", "مَن", "who", 871, false],
  ["ذَا", "ذا", "is it that", 1058, true],
  ["ٱلَّذِى", "الَّذِي", "the one who", 1468, true],
  ["يَشْفَعُ", "يَشْفَعُ", "intercedes", 5, false],
  ["عِندَهُۥٓ", "عِند", "with Him", 197, false],
  ["إِلَّا", "إِلّا", "except", 659, true],
  ["بِإِذْنِهِۦ", "إِذْن", "by His permission", 39, false],
  ["يَعْلَمُ", "عَلِمَ", "He knows", 382, false],
  ["مَا", "ما", "what", 2565, true],
  ["بَيْنَ", "بَيْن", "between", 266, false],
  ["أَيْدِيهِمْ", "يَد", "their hands (before them)", 120, false],
  ["وَمَا", "ما", "and what", 2565, true],
  ["خَلْفَهُمْ", "خَلْف", "behind them", 22, false],
  ["وَلَا", "لا", "and not", 1742, true],
  ["يُحِيطُونَ", "أَحاطَ", "they encompass", 17, false],
  ["بِشَىْءٍ", "شَىْء", "any thing", 283, false],
  ["مِّنْ", "مِن", "of", 3226, true],
  ["عِلْمِهِۦٓ", "عِلْم", "His knowledge", 105, false],
  ["إِلَّا", "إِلّا", "except", 659, true],
  ["بِمَا", "ما", "with what", 2565, true],
  ["شَآءَ", "شاءَ", "He wills", 236, false],
  ["وَسِعَ", "وَسِعَ", "extends", 6, false],
  ["كُرْسِيُّهُ", "كُرْسِيّ", "His Kursi (throne)", 2, false],
  ["ٱلسَّمَٰوَٰتِ", "سَماء", "the heavens", 310, false],
  ["وَٱلْأَرْضَ", "أَرْض", "and the earth", 461, false],
  ["وَلَا", "لا", "and not", 1742, true],
  ["يَـُٔودُهُۥ", "يَئُودُ", "burdens Him", 1, false],
  ["حِفْظُهُمَا", "حِفْظ", "preserving them", 3, false],
  ["وَهُوَ", "هُوَ", "and He", 0, true],
  ["ٱلْعَلِىُّ", "عَلِيّ", "the Most High", 11, false],
  ["ٱلْعَظِيمُ", "عَظِيم", "the Most Great", 107, false],
];

const MAX_FREQ = 2699; // اللّه

function freqClass(freq, isFunc) {
  if (isFunc) return 'freq-func';
  if (freq >= 100) return 'freq-high';
  if (freq >= 10) return 'freq-mid';
  return 'freq-low';
}

// Render verse with colored word chips
const verseEl = document.getElementById('verse-display');
verseEl.innerHTML = WORDS.map(([w, lem, en, freq, isFunc]) => {
  const cls = freqClass(freq, isFunc);
  return `<span class="word-chip ${cls}"><span class="tooltip">${en} — ${lem} (${freq.toLocaleString()}×)</span>${w}</span>`;
}).join(' ');

// Stats
const content = WORDS.filter(w => !w[4] && w[3] > 0);
const freqs = content.map(w => w[3]);
const sum = freqs.reduce((a, b) => a + b, 0);
const avg = Math.round(sum / freqs.length);
const sorted = [...freqs].sort((a, b) => a - b);
const median = sorted[Math.floor(sorted.length / 2)];
const high = freqs.filter(f => f >= 100).length;
const rare = freqs.filter(f => f < 10).length;

document.getElementById('stats').innerHTML = `
  <div class="stat-card"><div class="stat-value">${content.length}</div><div class="stat-label">Content lemmas</div></div>
  <div class="stat-card"><div class="stat-value">${avg.toLocaleString()}</div><div class="stat-label">Avg frequency</div></div>
  <div class="stat-card"><div class="stat-value">${median.toLocaleString()}</div><div class="stat-label">Median frequency</div></div>
  <div class="stat-card"><div class="stat-value">${sum.toLocaleString()}</div><div class="stat-label">Total frequency (sum)</div></div>
  <div class="stat-card"><div class="stat-value">${high}</div><div class="stat-label">High-freq words (100+)</div></div>
  <div class="stat-card"><div class="stat-value">${rare}</div><div class="stat-label">Rare words (&lt;10)</div></div>
`;

// Content table sorted by freq
const tbody = document.querySelector('#content-table tbody');
const contentSorted = [...content].sort((a, b) => b[3] - a[3]);
contentSorted.forEach(([w, lem, en, freq]) => {
  const barW = Math.max(2, Math.round((freq / MAX_FREQ) * 180));
  const cls = freqClass(freq, false);
  tbody.innerHTML += `<tr>
    <td class="arabic-cell">${w}</td>
    <td class="arabic-cell">${lem}</td>
    <td>${en}</td>
    <td style="text-align:right; font-weight:600">${freq.toLocaleString()}</td>
    <td><span class="freq-bar ${cls}" style="width:${barW}px; background:${freq>=100?'#22c55e':freq>=10?'#eab308':'#ef4444'}"></span></td>
  </tr>`;
});
</script>
</body>
</html>
