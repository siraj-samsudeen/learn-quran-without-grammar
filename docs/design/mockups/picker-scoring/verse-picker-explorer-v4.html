<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Verse Picker v4 — Interactive Selection</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f0f2f5; color: #1a1a1a; font-size: 14px; }

.hdr { background: #fff; color: #1e293b; padding: 12px 24px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #e2e8f0; }
.hdr h1 { font-size: 1.1rem; }
.hdr h1 .v { background: #8b5cf6; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; margin-left: 8px; }
.hdr .sub { color: #64748b; font-size: 0.75rem; margin-top: 1px; }

.ctl { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 10px 24px; position: sticky; top: 46px; z-index: 99; }
.cg { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 14px; align-items: end; }
.sg label { display: block; font-size: 0.68rem; font-weight: 600; color: #475569; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.04em; }
.sg .val { float: right; font-weight: 700; }
.d1c { color: #3b82f6; } .d3c { color: #ec4899; } .d4c { color: #f59e0b; }
.sg input[type=range] { width: 100%; }
.sg .desc { font-size: 0.62rem; color: #94a3b8; margin-top: 1px; }

.fr { display: flex; gap: 8px; margin-top: 8px; align-items: center; flex-wrap: wrap; }
.fr label { font-size: 0.76rem; color: #475569; }
.pill { padding: 3px 10px; border-radius: 99px; border: 1px solid #e2e8f0; font-size: 0.74rem; cursor: pointer; background: #fff; }
.pill.active { background: #1e293b; color: #fff; border-color: #1e293b; }
.pill:hover { border-color: #94a3b8; }
.pill.preset { background: #f8fafc; border-style: dashed; }
.pill.preset-rec { background: #ecfdf5; border-color: #86efac; font-weight: 600; }
select { padding: 3px 6px; border-radius: 5px; border: 1px solid #e2e8f0; font-size: 0.76rem; }
.tgl { font-size: 0.71rem; color: #64748b; display: flex; align-items: center; gap: 3px; }

/* ── STICKY SELECTION BAR ── */
.sel-bar { position: sticky; top: 108px; z-index: 98; background: #1e293b; color: #fff; padding: 6px 24px; display: flex; gap: 16px; align-items: center; font-size: 0.78rem; flex-wrap: wrap; }
.sel-bar .count { font-weight: 700; font-size: 0.9rem; }
.sel-bar .count.warn { color: #fbbf24; }
.sel-bar .count.ok { color: #34d399; }
.sel-bar .sep { width: 1px; height: 16px; background: #475569; }
.sel-bar .root-bar { display: flex; align-items: center; gap: 4px; }
.rb-fill { height: 8px; border-radius: 4px; }
.rb-ilah { background: #60a5fa; }
.rb-kab { background: #f472b6; }
.sel-bar .form-chips { display: flex; gap: 3px; flex-wrap: wrap; }
.sel-bar .fchip { padding: 1px 6px; border-radius: 3px; font-size: 0.65rem; font-family: 'Amiri', serif; direction: rtl; }
.fchip-i { background: rgba(96,165,250,0.3); }
.fchip-k { background: rgba(244,114,182,0.3); }
.sel-bar .actions { margin-left: auto; display: flex; gap: 6px; }
.sel-bar .btn { padding: 3px 10px; border-radius: 5px; border: 1px solid #475569; background: transparent; color: #94a3b8; font-size: 0.7rem; cursor: pointer; }
.sel-bar .btn:hover { background: #334155; color: #fff; }
.sel-bar .btn-detail { }
.detail-arrow { transition: transform 0.2s; display: inline-block; }
.detail-arrow.open { transform: rotate(180deg); }

/* ── DETAIL PANEL ── */
.sel-detail { display: none; background: #0f172a; color: #e2e8f0; padding: 12px 24px; position: sticky; top: 140px; z-index: 97; }
.sel-detail.open { display: block; }
.det-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.det-col h3 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; margin-bottom: 6px; }
.det-form-row { display: flex; align-items: center; gap: 6px; margin: 3px 0; font-size: 0.78rem; }
.det-form-name { font-family: 'Amiri', serif; direction: rtl; min-width: 80px; text-align: right; }
.det-bar { height: 6px; border-radius: 3px; min-width: 2px; }
.det-bar-i { background: #60a5fa; }
.det-bar-k { background: #f472b6; }
.det-cnt { font-size: 0.68rem; color: #94a3b8; min-width: 16px; }
.det-stat { font-size: 0.85rem; margin: 4px 0; }
.det-stat .num { font-weight: 700; font-size: 1.1rem; }
.det-stat .lbl { color: #64748b; font-size: 0.7rem; }
.det-missing { margin-top: 6px; }
.det-missing-chip { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 0.68rem; font-family: 'Amiri', serif; direction: rtl; background: rgba(239,68,68,0.2); color: #fca5a5; margin: 2px; cursor: pointer; }
.det-missing-chip:hover { background: rgba(239,68,68,0.4); }
.budget-ok { color: #34d399; }
.budget-warn { color: #fbbf24; }
.budget-over { color: #f87171; }

/* ── TABLE ── */
.main { padding: 0 24px 60px; }
table { width: 100%; border-collapse: collapse; margin-top: 4px; }
thead { position: sticky; top: 140px; z-index: 49; }
.sel-detail.open ~ .main table thead { top: 260px; }
th { background: #f1f5f9; padding: 5px 4px; text-align: left; font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600; color: #475569; border-bottom: 2px solid #e2e8f0; cursor: pointer; user-select: none; white-space: nowrap; }
th:hover { background: #e2e8f0; }
th.r { text-align: right; }
th.sd::after { content: ' ▼'; color: #3b82f6; }
th.sa::after { content: ' ▲'; color: #3b82f6; }
th.no-sort { cursor: default; }
th.no-sort:hover { background: #f1f5f9; }

td { padding: 4px 4px; border-bottom: 1px solid #f1f5f9; vertical-align: top; font-size: 0.8rem; }
td.r { text-align: right; font-variant-numeric: tabular-nums; }
td.ar { direction: rtl; font-family: 'Amiri', serif; font-size: 1.02rem; line-height: 1.55; max-width: 380px; }
td.en { color: #64748b; font-size: 0.72rem; max-width: 220px; line-height: 1.3; }
tr:hover { background: #f0f7ff; }
tr.selected { background: #ecfdf5; }
tr.selected:hover { background: #d1fae5; }

tr.row-whole td.ar { border-right: 3px solid #3b82f6; padding-right: 8px; }
tr.row-frag td.ar { border-right: 3px dashed #cbd5e1; padding-right: 8px; }

.rk { display: inline-block; width: 22px; height: 22px; line-height: 22px; text-align: center; border-radius: 99px; font-size: 0.66rem; font-weight: 700; }
.rk-t { background: #fef3c7; color: #92400e; }
.rk-m { background: #e0f2fe; color: #0369a1; }
.rk-l { background: #f1f5f9; color: #64748b; }

.sb { display: flex; gap: 1px; height: 10px; width: 80px; border-radius: 3px; overflow: hidden; }
.sb div { height: 100%; }
.sb1 { background: #3b82f6; } .sb3 { background: #ec4899; } .sb4 { background: #f59e0b; }

.fc { display: inline-block; padding: 1px 5px; border-radius: 4px; font-size: 0.72rem; font-family: 'Amiri', serif; direction: rtl; margin: 1px; }
.fc-i { background: #dbeafe; color: #1d4ed8; }
.fc-k { background: #fce7f3; color: #be185d; }

.frag-badge { font-size: 0.58rem; color: #94a3b8; background: #f1f5f9; padding: 1px 4px; border-radius: 3px; }

.chk { width: 16px; height: 16px; accent-color: #059669; cursor: pointer; }

.ctx { display: none; }
.ctx.open { display: table-row; }
.ctx td { border-bottom: 2px solid #e2e8f0; padding: 6px 16px; background: #f8fafc; }
.ctx-ar { direction: rtl; font-family: 'Amiri', serif; font-size: 0.88rem; color: #64748b; line-height: 1.6; }
.ctx-label { font-size: 0.63rem; color: #94a3b8; text-transform: uppercase; margin-bottom: 2px; }

.di { font-size: 0.68rem; color: #94a3b8; font-style: italic; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">
</head>
<body>

<div class="hdr">
  <h1>Sentence Picker<span class="v">v4</span></h1>
  <div class="sub">Select 10-12 sentences for Lesson 1 · Top 10 auto-selected · Toggle rows to adjust</div>
</div>

<div class="ctl">
  <div class="cg">
    <div class="sg"><label>D1: Avg Frequency <span class="val d1c" id="w1v">35</span></label><input type="range" id="w1" min="0" max="100" value="35" oninput="upd()"><div class="desc">Common words in the Quran</div></div>
    <div class="sg"><label>D3: Content Coverage <span class="val d3c" id="w3v">25</span></label><input type="range" id="w3" min="0" max="100" value="25" oninput="upd()"><div class="desc">New vocabulary unlocked</div></div>
    <div class="sg"><label>D4: Length Sweet Spot <span class="val d4c" id="w4v">40</span></label><input type="range" id="w4" min="0" max="100" value="40" oninput="upd()"><div class="desc">5-12 words ideal</div></div>
    <div class="sg"><label>Diversity Decay <span class="val" id="dv" style="color:#64748b">0.70</span></label><input type="range" id="dc" min="30" max="100" value="70" oninput="upd()"><div class="desc">Lower = more form variety</div></div>
  </div>
  <div class="fr">
    <label>Root:</label>
    <span class="pill active" data-r="all" onclick="sr('all')">All</span>
    <span class="pill" data-r="ilāh" onclick="sr('ilāh')">ilāh</span>
    <span class="pill" data-r="kabura" onclick="sr('kabura')">kabura</span>
    <label style="margin-left:10px">Show:</label>
    <select id="tn" onchange="upd()"><option value="20">20</option><option value="30" selected>30</option><option value="50">50</option><option value="290">All</option></select>
    <label class="tgl" style="margin-left:10px"><input type="checkbox" id="dv_on" checked onchange="upd()"> Diversity</label>
    <span class="pill preset-rec" onclick="pre(35,25,40)" style="margin-left:14px">Recommended</span>
    <span class="pill preset" onclick="pre(20,20,60)">Short</span>
    <span class="pill preset" onclick="pre(50,25,25)">Frequency</span>
  </div>
</div>

<!-- STICKY SELECTION BAR -->
<div class="sel-bar" id="sel-bar"></div>

<!-- EXPANDABLE DETAIL PANEL -->
<div class="sel-detail" id="sel-detail"></div>

<div class="main">
<table>
  <thead><tr>
    <th style="width:26px">#</th>
    <th class="r sd" onclick="srt('composite')" id="th-composite">Score</th>
    <th onclick="srt('ref')" id="th-ref">Ref</th>
    <th>Forms</th>
    <th>Arabic</th>
    <th class="no-sort" style="width:28px">✓</th>
    <th>English</th>
    <th class="r" onclick="srt('word_count')" id="th-word_count">Wds</th>
    <th class="r" onclick="srt('d1n')" id="th-d1n">D1</th>
    <th class="r" onclick="srt('d3n')" id="th-d3n">D3</th>
    <th class="r" onclick="srt('d4')" id="th-d4">D4</th>
    <th style="width:85px">Mix</th>
  </tr></thead>
  <tbody id="tb"></tbody>
</table>
</div>

function togSel(idx){
  D[idx].selected=!D[idx].selected;
  updateSelBar();
  const row=document.getElementById('row-'+idx);
  if(row)row.classList.toggle('selected',D[idx].selected);
  const chk=document.getElementById('chk-'+idx);
  if(chk)chk.checked=D[idx].selected;
}

function autoSelect(disp){
  D.forEach(d=>d.selected=false);
  disp.slice(0,10).forEach(d=>d.selected=true);
}

function clearAll(){D.forEach(d=>d.selected=false);upd();}
function selectTop10(){
  // Re-autoselect based on current display
  D.forEach(d=>d.selected=false);
  const disp=document.querySelectorAll('tr[data-idx]');
  let count=0;
  disp.forEach(tr=>{
    if(count<10){const idx=+tr.dataset.idx;D[idx].selected=true;count++;}
  });
  upd();
}

function toggleDetail(){
  detailOpen=!detailOpen;
  document.getElementById('sel-detail').classList.toggle('open',detailOpen);
  document.querySelector('.detail-arrow').classList.toggle('open',detailOpen);
}

function updateSelBar(){
  const sel=D.filter(d=>d.selected);
  const n=sel.length;
  const cntCls=n>=10&&n<=12?'ok':n>12?'warn':'';
  
  // Form counts (forms are the source of truth, not roots)
  const formCnt={};
  sel.forEach(d=>d.forms.forEach(f=>{formCnt[f]=(formCnt[f]||0)+1;}));
  const sortedForms=Object.entries(formCnt).sort((a,b)=>b[1]-a[1]);
  const formCount=Object.keys(formCnt).length;

  // Root counts derived from FORMS (not from d.roots which includes excluded اللَّه)
  const ilahFormCnt=sortedForms.filter(([f])=>FORM_ROOT[f]&&FORM_ROOT[f]!=='kabura').reduce((s,[,c])=>s+c,0);
  const kabFormCnt=sortedForms.filter(([f])=>FORM_ROOT[f]==='kabura').reduce((s,[,c])=>s+c,0);
  const ilahFormTypes=sortedForms.filter(([f])=>FORM_ROOT[f]&&FORM_ROOT[f]!=='kabura').length;
  const kabFormTypes=sortedForms.filter(([f])=>FORM_ROOT[f]==='kabura').length;

  // Word stats
  const totalW=sel.reduce((s,d)=>s+d.word_count,0);
  const avgW=n?totalW/n:0;

  // Chips for selected forms (top 8)
  const chips=sortedForms.slice(0,8).map(([f,c])=>{
    const cls=FORM_ROOT[f]&&FORM_ROOT[f]!=='kabura'?'fchip-i':'fchip-k';
    return `<span class="fchip ${cls}">${f} ×${c}</span>`;
  }).join('');
  const more=sortedForms.length>8?`<span style="font-size:0.65rem;color:#64748b">+${sortedForms.length-8}</span>`:'';

  // Bar widths
  const maxBar=Math.max(ilahFormCnt,kabFormCnt,1);
  const iW=Math.round(ilahFormCnt/maxBar*50);
  const kW=Math.round(kabFormCnt/maxBar*50);

  document.getElementById('sel-bar').innerHTML=`
    <span class="count ${cntCls}">${n}</span><span style="color:#64748b">/ 10-12</span>
    <span class="sep"></span>
    <span class="root-bar">ilāh <span class="rb-fill rb-ilah" style="width:${iW}px"></span> ${ilahFormCnt} (${ilahFormTypes}f)</span>
    <span class="root-bar">kabura <span class="rb-fill rb-kab" style="width:${kW}px"></span> ${kabFormCnt} (${kabFormTypes}f)</span>
    <span class="sep"></span>
    <span>${formCount} forms</span>
    <span class="sep"></span>
    <span>${totalW}w · avg ${avgW.toFixed(1)}</span>
    <span class="sep"></span>
    <div class="form-chips">${chips}${more}</div>
    <div class="actions">
      <button class="btn" onclick="selectTop10()">Auto Top 10</button>
      <button class="btn" onclick="clearAll()">Clear</button>
      <button class="btn btn-detail" onclick="toggleDetail()">Details <span class="detail-arrow${detailOpen?' open':''}">▼</span></button>
    </div>`;

  // Update detail panel — forms as sorted tables
  const ilahForms=sortedForms.filter(([f])=>FORM_ROOT[f]&&FORM_ROOT[f]!=='kabura');
  const kabForms=sortedForms.filter(([f])=>FORM_ROOT[f]==='kabura');
  const maxFC=Math.max(...sortedForms.map(([,c])=>c),1);

  const missingForms=ALL_FORMS.filter(f=>!formCnt[f]);
  const missingIlah=missingForms.filter(f=>FORM_ROOT[f]&&FORM_ROOT[f]!=='kabura');
  const missingKab=missingForms.filter(f=>FORM_ROOT[f]==='kabura');

  function formTable(forms, cls, rootLabel) {
    if (!forms.length) return '<div style="font-size:0.75rem;color:#64748b;padding:4px 0">No ' + rootLabel + ' forms selected</div>';
    var rows = '';
    forms.forEach(function(pair) {
      var f = pair[0], c = pair[1];
      var w = Math.round(c / maxFC * 80);
      var hl = c > 1 ? 'font-weight:700;' : '';
      rows += '<tr><td style="direction:rtl;font-family:Amiri,serif;font-size:0.85rem;padding:3px 8px;text-align:right">' + f + '</td><td style="padding:3px 4px"><span class="det-bar ' + cls + '" style="width:' + w + 'px"></span></td><td style="padding:3px 8px;' + hl + 'font-size:0.8rem;text-align:right">' + c + '</td></tr>';
    });
    return '<table style="border-collapse:collapse;width:100%"><thead><tr><th style="text-align:right;font-size:0.6rem;color:#64748b;padding:2px 8px;border-bottom:1px solid #334155">FORM</th><th style="font-size:0.6rem;color:#64748b;padding:2px 4px;border-bottom:1px solid #334155"></th><th style="text-align:right;font-size:0.6rem;color:#64748b;padding:2px 8px;border-bottom:1px solid #334155">COUNT</th></tr></thead><tbody>' + rows + '</tbody></table>';
  }

  function missingChips(forms) {
    if (!forms.length) return '<span style="color:#34d399;font-size:0.72rem">All covered</span>';
    return forms.map(function(f) {
      var cls = FORM_ROOT[f]&&FORM_ROOT[f]!=='kabura' ? 'fchip-i' : 'fchip-k';
      return '<span class="det-missing-chip ' + cls + '">' + f + '</span>';
    }).join('');
  }

  var budgetPhrases=n>=10&&n<=12?'budget-ok':n>12?'budget-over':'budget-warn';
  var budgetWords=totalW>=80&&totalW<=130?'budget-ok':totalW>130?'budget-over':'budget-warn';

  var detHtml = '<div class="det-grid">';
  detHtml += '<div class="det-col">';
  detHtml += '<h3 style="color:#60a5fa">ilāh Forms (' + ilahForms.length + ' selected · ' + missingIlah.length + ' missing)</h3>';
  detHtml += formTable(ilahForms, 'det-bar-i', 'ilāh');
  if (missingIlah.length) detHtml += '<div style="margin-top:6px;font-size:0.62rem;color:#64748b">MISSING:</div>' + missingChips(missingIlah);
  detHtml += '<div style="margin-top:16px"><h3 style="color:#f472b6">kabura Forms (' + kabForms.length + ' selected · ' + missingKab.length + ' missing)</h3></div>';
  detHtml += formTable(kabForms, 'det-bar-k', 'kabura');
  if (missingKab.length) detHtml += '<div style="margin-top:6px;font-size:0.62rem;color:#64748b">MISSING:</div>' + missingChips(missingKab);
  detHtml += '</div>';
  detHtml += '<div class="det-col">';
  detHtml += '<h3>Selection Stats</h3>';
  detHtml += '<div class="det-stat"><span class="num ' + budgetPhrases + '">' + n + '</span> <span class="lbl">sentences (target 10-12)</span></div>';
  detHtml += '<div class="det-stat"><span class="num ' + budgetWords + '">' + totalW + '</span> <span class="lbl">total words (target 100-120)</span></div>';
  detHtml += '<div class="det-stat"><span class="num">' + avgW.toFixed(1) + '</span> <span class="lbl">avg words/sentence</span></div>';
  detHtml += '<div class="det-stat"><span class="num">' + (n?Math.min(...sel.map(function(d){return d.word_count})):'-') + '</span> <span class="lbl">shortest</span></div>';
  detHtml += '<div class="det-stat"><span class="num">' + (n?Math.max(...sel.map(function(d){return d.word_count})):'-') + '</span> <span class="lbl">longest</span></div>';
  detHtml += '</div>';
  detHtml += '<div class="det-col">';
  detHtml += '<h3>Budget</h3>';
  detHtml += '<div class="det-stat"><span class="num">' + formCount + '</span> <span class="lbl">of ' + ALL_FORMS.length + ' forms covered</span></div>';
  var allMissing = missingIlah.concat(missingKab);
  detHtml += '<div class="det-missing"><div style="font-size:0.68rem;color:#64748b;margin-bottom:4px">ALL MISSING:</div>' + (allMissing.length ? missingChips(allMissing) : '<span style="color:#34d399;font-size:0.72rem">All forms covered!</span>') + '</div>';
  detHtml += '</div></div>';
  document.getElementById('sel-detail').innerHTML = detHtml;
}

function upd(){
  const w1=+document.getElementById('w1').value;
  const w3=+document.getElementById('w3').value,w4=+document.getElementById('w4').value;
  const wt=w1+w3+w4||1;
  const dc=+document.getElementById('dc').value/100,tn=+document.getElementById('tn').value;
  const dvOn=document.getElementById('dv_on').checked;
  document.getElementById('w1v').textContent=w1;
  document.getElementById('w3v').textContent=w3;document.getElementById('w4v').textContent=w4;
  document.getElementById('dv').textContent=dc.toFixed(2);

  let f=D;
  if(cr==='ilāh')f=D.filter(d=>d.roots.includes('ilāh'));
  else if(cr==='kabura')f=D.filter(d=>d.roots.includes('kabura'));

  f.forEach(d=>{d.composite=(d.d1n*w1+d.d3n*w3+d.d4*w4)/wt;});
  f.sort((a,b)=>asc?a[cs]-b[cs]:b[cs]-a[cs]);

  let disp;
  if(dvOn){
    const rem=[...f],pk=[],fc={};
    while(pk.length<tn&&rem.length>0){
      let bi=-1,be=-1;
      for(let j=0;j<rem.length;j++){
        const d=rem[j],pf=d.forms[0]||'none',c=fc[pf]||0;
        const e=d.composite*Math.pow(dc,c);
        if(e>be){be=e;bi=j;}
      }
      const p=rem.splice(bi,1)[0];
      const pf=p.forms[0]||'none';
      fc[pf]=(fc[pf]||0)+1;
      p.effective=be;p.fp=fc[pf];
      pk.push(p);
    }
    disp=pk;
    if(cs!=='composite'&&cs!=='effective'){
      disp.sort((a,b)=>asc?a[cs]-b[cs]:b[cs]-a[cs]);
    }
  } else {
    disp=f.slice(0,tn);
    disp.forEach(d=>{d.effective=d.composite;d.fp=0;});
  }

  // Auto-select top 10 if nothing selected yet
  if(!D.some(d=>d.selected)){
    disp.slice(0,10).forEach(d=>d.selected=true);
  }

  const tb=document.getElementById('tb');
  tb.innerHTML='';
  disp.forEach((d,i)=>{
    const rk=i+1;
    const rkc=rk<=10?'rk-t':rk<=20?'rk-m':'rk-l';
    const bt=d.d1n*w1/wt+d.d3n*w3/wt+d.d4*w4/wt;
    const bs=80/(bt||1);
    const b1=Math.max(1,(d.d1n*w1/wt)*bs);
    const b3=Math.max(1,(d.d3n*w3/wt)*bs);
    const b4=Math.max(1,(d.d4*w4/wt)*bs);
    const fc=d.form_labels.map(fl=>`<span class="fc ${fl.includes('ilāh')?'fc-i':'fc-k'}">${fl}</span>`).join('');
    const rowCls=(d.is_whole?'row-whole':'row-frag')+(d.selected?' selected':'');
    const fragBadge=d.is_whole?'<span style="font-size:0.56rem;color:#3b82f6">full</span>':`<span class="frag-badge">${d.frag_idx}/${d.frag_total}</span>`;
    const enDisplay=d.english?(d.is_whole?d.english:`<span style="opacity:0.6">${d.english}</span>`):'';

    tb.innerHTML+=`<tr class="${rowCls}" id="row-${d.idx}" data-idx="${d.idx}" onclick="togSel(${d.idx})" style="cursor:pointer">
      <td><span class="rk ${rkc}">${rk}</span></td>
      <td class="r" style="font-weight:700;color:${rk<=10?'#059669':rk<=20?'#0369a1':'#64748b'}">${d.composite.toFixed(1)}</td>
      <td><strong style="font-size:0.76rem">${d.surah}</strong><br><span style="color:#94a3b8;font-size:0.66rem">${d.ref}</span> ${fragBadge}</td>
      <td>${fc}</td>
      <td class="ar">${d.arabic}</td>
      <td style="vertical-align:middle;text-align:center"><input type="checkbox" class="chk" id="chk-${d.idx}" ${d.selected?'checked':''} onclick="event.stopPropagation();togSel(${d.idx})"></td>
      <td class="en">${enDisplay}</td>
      <td class="r">${d.word_count}</td>
      <td class="r">${d.d1n.toFixed(1)}</td>
      <td class="r">${d.d3n.toFixed(1)}</td>
      <td class="r">${d.d4}</td>
      <td><div class="sb"><div class="sb1" style="width:${b1}px"></div><div class="sb3" style="width:${b3}px"></div><div class="sb4" style="width:${b4}px"></div></div></td>
    </tr>
    <tr style="display:none"><td colspan="12"></td>
    </td></tr>`;
  });

  updateSelBar();
}

function togCtx(id){document.getElementById(id).classList.toggle('open');}
upd();
</script>
